name: Neural Indexing - Robot Kuli

on:
  push:
    paths:
      - 'database/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate Neural Index
        run: |
          python << 'EOF'
          import os, json, yaml

          index_data = []
          db_folder = 'database'

          if not os.path.exists(db_folder):
              os.makedirs(db_folder)
              print(f"Folder {db_folder} dibuat.")

          files = [f for f in os.listdir(db_folder) if f.endswith('.yml')]
          print(f"Ditemukan {len(files)} file database.")

          for filename in files:
              path = os.path.join(db_folder, filename)
              with open(path, 'r', encoding='utf-8') as f:
                  try:
                      content = yaml.safe_load(f)
                      if not isinstance(content, list): continue
                      
                      keys = set()
                      for item in content:
                          # Ambil kata dari judul (t) dan ringkasan (s)
                          text = str(item.get('t', item.get('topic', ''))) + " " + str(item.get('s', item.get('summary', '')))
                          # Ambil kata yang panjangnya > 3 huruf agar akurat
                          words = [w.lower() for w in text.split() if len(w) > 3]
                          keys.update(words)
                      
                      index_data.append({
                          "file": path,
                          "keys": list(keys)[:100] # Simpan 100 kata kunci per file
                      })
                      print(f"✅ Berhasil index: {filename}")
                  except Exception as e: 
                      print(f"❌ Error di file {filename}: {e}")

          with open('brain_index.json', 'w', encoding='utf-8') as f:
              json.dump(index_data, f, indent=2)
          EOF

      - name: Push Update
        run: |
          git config --local user.name "Robot Neural"
          git config --local user.email "neural@smartai.alan"
          git add brain_index.json
          git diff --staged --quiet || (git commit -m "Update Neural Index 🧠" && git push)
