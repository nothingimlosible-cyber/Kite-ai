name: LITE-AI-NEURAL-CORE

on:
  schedule:
    - cron: '0 */12 * * *' # Nambang tiap 12 jam
  push:
    paths:
      - 'database/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  core-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Libs
        run: pip install pyyaml wikipedia

      - name: Processing Neural Data
        run: |
          python << 'EOF'
          import os, json, yaml, wikipedia, time, random

          wikipedia.set_lang("id")
          db_folder = 'database'
          if not os.path.exists(db_folder): os.makedirs(db_folder)

          # --- 1. MINING LAYER (Hanya nambang jika perlu) ---
          keywords = ["Kecerdasan Buatan", "Sejarah Dunia", "Teknologi Web", "Astronomi"]
          path_induk = os.path.join(db_folder, 'main_data.yml')
          
          # Load data lama agar tidak duplikat
          data_lama = []
          if os.path.exists(path_induk):
              with open(path_induk, 'r', encoding='utf-8') as f:
                  data_lama = yaml.safe_load(f) or []

          new_entries = []
          for key in random.sample(keywords, 2): # Ambil 2 topik acak
              try:
                  search = wikipedia.search(key, results=3)
                  for title in search:
                      p = wikipedia.page(title)
                      entry = {"t": p.title, "s": p.summary.split('\n')[0][:200], "d": "2026-05-08"}
                      if entry['t'] not in [x.get('t') for x in data_lama]:
                          new_entries.append(entry)
                          print(f"✅ Menemukan: {p.title}")
              except: continue
          
          # Gabung dan simpan
          data_total = data_lama + new_entries
          with open(path_induk, 'w', encoding='utf-8') as f:
              yaml.dump(data_total, f, allow_unicode=True, sort_keys=False)

          # --- 2. NEURAL INDEXING LAYER (Daftar Isi Pintar) ---
          index_global = []
          for filename in os.listdir(db_folder):
              if filename.endswith('.yml'):
                  path = os.path.join(db_folder, filename)
                  with open(path, 'r', encoding='utf-8') as f:
                      try:
                          content = yaml.safe_load(f)
                          if not content: continue
                          # Ambil kata kunci unik per file
                          keys = set()
                          for item in content:
                              text = str(item.get('t','')) + " " + str(item.get('s',''))
                              keys.update([w.lower() for w in text.split() if len(w) > 3])
                          index_global.append({"file": path, "keys": list(keys)[:150]})
                      except: continue

          with open('brain_index.json', 'w', encoding='utf-8') as f:
              json.dump(index_global, f, indent=2)
          EOF

      - name: Deploy to Brain
        run: |
          git config --local user.name "Neural Robot"
          git config --local user.email "ai@alan.tech"
          git add .
          git diff --staged --quiet || (git commit -m "Neural Update: Memory Synced 🧠" && git push)
