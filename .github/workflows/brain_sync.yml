name: LITE-AI-NEURAL-CORE

on:
  schedule:
    - cron: '0 */12 * * *' # Nambang tiap 12 jam
  push:
    paths:
      - 'database/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  core-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pyyaml wikipedia

      - name: Processing Neural Data
        run: |
          python << 'EOF'
          import os, json, yaml, wikipedia, time, random
          from datetime import datetime

          wikipedia.set_lang("id")
          db_folder = 'database'
          if not os.path.exists(db_folder):
              os.makedirs(db_folder)

          # --- 1. MINING LAYER ---
          keywords = [
              "Kecerdasan Buatan", "Sejarah Dunia", "Teknologi Web", "Astronomi",
              "Fisika Kuantum", "Biologi Sel", "Ekonomi Global", "Revolusi Industri",
              "Pemrograman Komputer", "Sistem Operasi", "Internet", "Machine Learning",
              "Kesehatan Mental", "Perubahan Iklim", "Energi Terbarukan", "Sejarah Indonesia",
              "Filsafat", "Matematika", "Kimia Organik", "Geografi Dunia"
          ]

          path_induk = os.path.join(db_folder, 'main_data.yml')

          # Load data lama agar tidak duplikat
          data_lama = []
          if os.path.exists(path_induk):
              with open(path_induk, 'r', encoding='utf-8') as f:
                  data_lama = yaml.safe_load(f) or []

          judul_lama = set(x.get('t') for x in data_lama)
          today = datetime.now().strftime('%Y-%m-%d')
          new_entries = []

          for key in random.sample(keywords, 3):  # Ambil 3 topik acak per run
              try:
                  search = wikipedia.search(key, results=5)
                  for title in search:
                      if title in judul_lama:
                          print(f"⏭️  Skip duplikat: {title}")
                          continue
                      try:
                          p = wikipedia.page(title, auto_suggest=False)
                          summary = p.summary.split('\n')[0][:500]  # Lebih panjang = AI lebih pintar
                          entry = {"t": p.title, "s": summary, "d": today}
                          new_entries.append(entry)
                          judul_lama.add(p.title)
                          print(f"✅ Menemukan: {p.title}")
                          time.sleep(0.5)  # Hindari rate limit Wikipedia
                      except wikipedia.exceptions.DisambiguationError as e:
                          # Coba opsi pertama dari halaman disambiguasi
                          try:
                              p = wikipedia.page(e.options[0], auto_suggest=False)
                              summary = p.summary.split('\n')[0][:500]
                              entry = {"t": p.title, "s": summary, "d": today}
                              new_entries.append(entry)
                              judul_lama.add(p.title)
                              print(f"✅ Disambiguasi: {p.title}")
                              time.sleep(0.5)
                          except:
                              continue
                      except:
                          continue
              except Exception as e:
                  print(f"❌ Gagal keyword '{key}': {e}")
                  continue

          # Gabung dan simpan
          data_total = data_lama + new_entries
          with open(path_induk, 'w', encoding='utf-8') as f:
              yaml.dump(data_total, f, allow_unicode=True, sort_keys=False)

          print(f"\n📊 Total data: {len(data_total)} entri ({len(new_entries)} baru)")

          # --- 2. NEURAL INDEXING LAYER ---
          index_global = []
          total_entri = 0

          for filename in os.listdir(db_folder):
              if not filename.endswith('.yml'):
                  continue
              path = os.path.join(db_folder, filename)
              with open(path, 'r', encoding='utf-8') as f:
                  try:
                      content = yaml.safe_load(f)
                      if not content:
                          continue
                      keys = set()
                      for item in content:
                          text = str(item.get('t', '')) + " " + str(item.get('s', ''))
                          words = [w.lower().strip('.,!?;:') for w in text.split()]
                          keys.update([w for w in words if len(w) > 3])
                      total_entri += len(content)
                      index_global.append({
                          "file": path,
                          "total": len(content),
                          "keys": sorted(list(keys))[:200]  # Lebih banyak keyword per file
                      })
                  except Exception as e:
                      print(f"❌ Error indexing {filename}: {e}")
                      continue

          # Simpan index di dalam database/ agar ikut commit
          index_path = os.path.join(db_folder, 'brain_index.json')
          with open(index_path, 'w', encoding='utf-8') as f:
              json.dump({
                  "updated": today,
                  "total_entries": total_entri,
                  "files": index_global
              }, f, indent=2, ensure_ascii=False)

          print(f"🧠 Index selesai: {total_entri} total entri diindex")
          EOF

      - name: Deploy to Brain
        run: |
          git config --local user.name "Neural Robot"
          git config --local user.email "ai@alan.tech"
          git add .
          git diff --staged --quiet || (git commit -m "Neural Update: Memory Synced 🧠 [$(date '+%Y-%m-%d %H:%M')]" && git push)
