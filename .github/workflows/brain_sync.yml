name: Neural Indexing & Mining - Robot Kuli

on:
  schedule:
    - cron: '0 */6 * * *' 
  push:
    paths:
      - 'database/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Libs
        run: pip install pyyaml wikipedia

      - name: Mining & Indexing
        run: |
          python << 'EOF'
          import os, json, yaml, wikipedia, time

          wikipedia.set_lang("id")
          db_folder = 'database'
          if not os.path.exists(db_folder): os.makedirs(db_folder)

          # 1. PROSES NAMBANG (Biar database gak kosong)
          keywords = ["HTML5", "Sejarah Dunia", "Kecerdasan Buatan", "Astronomi"]
          new_data = []
          for key in keywords:
              try:
                  search = wikipedia.search(key, results=2)
                  for title in search:
                      p = wikipedia.page(title)
                      new_data.append({
                          "t": p.title,
                          "s": p.summary.split('\n')[0][:200],
                          "d": "2026-05-08"
                      })
                      print(f"✅ Nambang: {p.title}")
              except: continue
          
          # Simpan hasil tambang ke data.yml
          with open(os.path.join(db_folder, 'data.yml'), 'w', encoding='utf-8') as f:
              yaml.dump(new_data, f, allow_unicode=True)

          # 2. PROSES NEURAL INDEXING (Bikin Daftar Isi)
          index_data = []
          for filename in os.listdir(db_folder):
              if filename.endswith('.yml'):
                  path = os.path.join(db_folder, filename)
                  with open(path, 'r', encoding='utf-8') as f:
                      try:
                          content = yaml.safe_load(f)
                          keys = set()
                          for item in content:
                              text = str(item.get('t','')) + " " + str(item.get('s',''))
                              keys.update([w.lower() for w in text.split() if len(w) > 3])
                          index_data.append({"file": path, "keys": list(keys)[:100]})
                      except: continue

          with open('brain_index.json', 'w', encoding='utf-8') as f:
              json.dump(index_data, f, indent=2)
          EOF

      - name: Push Update
        run: |
          git config --local user.name "Robot Neural"
          git config --local user.email "neural@smartai.alan"
          git add .
          git diff --staged --quiet || (git commit -m "Mining & Index Update 🧠" && git push)
