name: KITE-INFINITE-CODER-MINER

on:
  schedule:
    - cron: '0 */4 * * *' # Sekolah tiap 4 jam
  workflow_dispatch: # Bisa dijalankan manual buat ngetes

permissions:
  contents: write

jobs:
  ultimate-learning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Libs
        run: pip install pyyaml wikipedia

      - name: Deep Neural Mining
        run: |
          python << 'EOF'
          import os, yaml, wikipedia, random
          from datetime import datetime

          wikipedia.set_lang("id")
          db_folder = 'brain'
          if not os.path.exists(db_folder): os.makedirs(db_folder)

          world_coding_map = {
              "frontend.yml": ["React.js", "Vue.js", "WebAssembly", "TypeScript", "Three.js"],
              "backend.yml": ["Node.js", "Golang", "Rust Programming", "Python Asyncio", "Microservices"],
              "mobile_dev.yml": ["Flutter SDK", "React Native", "SwiftUI", "Kotlin Multiplatform"],
              "data_science.yml": ["TensorFlow", "PyTorch", "Deep Learning", "Machine Learning"],
              "devops_security.yml": ["Docker", "Kubernetes", "Cyber Security", "Linux Kernel"],
              "personality.yml": ["Software Engineering", "Open Source", "Clean Code"]
          }

          today = datetime.now().strftime('%Y-%m-%d')

          for filename, topics in world_coding_map.items():
              path_db = os.path.join(db_folder, filename)
              old_data = []
              if os.path.exists(path_db):
                  try:
                      with open(path_db, 'r', encoding='utf-8') as f:
                          old_data = yaml.safe_load(f) or []
                  except: pass
              
              titles_set = set(x.get('t') for x in old_data if isinstance(x, dict))
              selected_topics = random.sample(topics, min(len(topics), 2))
              
              for target in selected_topics:
                  try:
                      search = wikipedia.search(target, results=1)
                      if not search: continue
                      title = search[0]
                      if title in titles_set: continue
                      
                      p = wikipedia.page(title, auto_suggest=False)
                      summary = p.summary.split('\n')[0][:700]
                      
                      entry = {
                          "t": p.title,
                          "s": f"### 📘 Knowledge: {p.title}\n\n{summary}...",
                          "d": today
                      }
                      old_data.append(entry)
                      print(f"Berhasil menambang: {p.title}")
                  except: continue

              with open(path_db, 'w', encoding='utf-8') as f:
                  yaml.dump(old_data, f, allow_unicode=True)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "Kite-Minter-Bot"
          git config --global user.email "bot@kite-infinite.com"
          git add brain/*.yml
          git commit -m "🤖 Robot Update: Tambah ilmu baru di folder brain [skip ci]" || exit 0
          git push
