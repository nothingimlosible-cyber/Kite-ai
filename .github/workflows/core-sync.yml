name: KITE-INFINITE-CODER-MINER

on:
  schedule:
    - cron: '0 */4 * * *' # Sekolah tiap 4 jam (Makin rajin!)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ultimate-learning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Libs
        run: pip install pyyaml wikipedia

      - name: Deep Neural Mining
        run: |
          python << 'EOF'
          import os, yaml, wikipedia, random
          from datetime import datetime

          wikipedia.set_lang("id")
          db_folder = 'brain'
          if not os.path.exists(db_folder): os.makedirs(db_folder)

          # --- KURIKULUM CODING DUNIA ---
          # Saya masukkan semua bahasa dan teknologi inti di sini
          world_coding_map = {
              "frontend.yml": [
                  "React.js Architecture", "Vue.js Composition API", "Angular Framework",
                  "Svelte Framework", "WebAssembly", "TypeScript Interfaces", "Three.js 3D"
              ],
              "backend.yml": [
                  "Node.js Microservices", "Golang Concurrency", "Rust Programming Language",
                  "Python Asyncio", "Java Spring Boot", "Ruby on Rails", "PHP 8 Attributes"
              ],
              "mobile_dev.yml": [
                  "Flutter SDK", "React Native", "SwiftUI", "Kotlin Multiplatform", "Android Jetpack"
              ],
              "data_science.yml": [
                  "TensorFlow AI", "PyTorch Deep Learning", "Scikit-learn Machine Learning",
                  "Data Visualization D3.js", "Big Data Hadoop", "Apache Spark"
              ],
              "devops_security.yml": [
                  "Docker Containerization", "Kubernetes Clusters", "Cyber Security",
                  "Penetration Testing", "CI/CD Pipeline", "Linux Kernel System"
              ],
              "personality.yml": [
                  "Teknik Komunikasi Cerdas", "Bahasa Gaul Programmer", "Mentalitas Coder Dewa"
              ]
          }

          today = datetime.now().strftime('%Y-%m-%d')

          for filename, topics in world_coding_map.items():
              path_db = os.path.join(db_folder, filename)
              old_data = []
              if os.path.exists(path_db):
                  try:
                      with open(path_db, 'r', encoding='utf-8') as f:
                          old_data = yaml.safe_load(f) or []
                  except: pass
              
              titles_set = set(x.get('t') for x in old_data)
              # Robot mengambil 2 topik sekaligus biar cepat pinter
              selected_topics = random.sample(topics, min(len(topics), 2))
              
              for target in selected_topics:
                  try:
                      search = wikipedia.search(target, results=2)
                      for title in search:
                          if title in titles_set: continue
                          p = wikipedia.page(title, auto_suggest=False)
                          
                          # Format konten agar lebih "Cerdas"
                          summary = p.summary.split('\n')[0][:700]
                          entry = {
                              "t": p.title,
                              "s": f"### 📘 Knowledge: {p.title}\n\n{summary}\n\n
http://googleusercontent.com/immersive_entry_chip/0

---

### Kenapa Ini Disebut "Infinite Coder"?
1.  **Cakupan Raksasa:** Dari bikin web, aplikasi HP, sampai **Artificial Intelligence (AI)** dan **Cyber Security** sudah masuk dalam "kurikulum" robot kamu.
2.  **Double Learning:** Setiap kali jalan, robot ini ambil 2 topik per kategori. Jadi ilmunya nambah 2x lipat lebih cepat.
3.  **Automatic Expansion:** Setiap 4 jam dia bakal nambahin ilmu baru. Kalau kamu biarin sebulan, folder `brain` kamu bakal penuh sama ilmu-ilmu sakti.

Sekarang, silakan update kedua filenya. Terus kamu coba manual Actions-nya 2-3 kali. Setelah itu, coba tanya hal sulit seperti: **"Apa itu TensorFlow?"** atau **"Jelasin soal Docker"**. Pasti dia langsung bisa jawab! 🚀🤣

Siap buat punya AI yang paling pinter se-kecamatan, Lan?
