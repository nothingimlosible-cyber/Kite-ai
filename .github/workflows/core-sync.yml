          categories = {
              "javascript.yml": ["JavaScript", "React.js", "Node.js", "TypeScript"],
              "python.yml": ["Bahasa Pemrograman Python", "Django", "FastAPI"],
              "web_design.yml": ["Tailwind CSS", "HTML5", "CSS3 Animation"],
              "database.yml": ["SQL", "MongoDB Database", "PostgreSQL"]
          }

          for filename, topics in categories.items():
              path_db = os.path.join(db_folder, filename)
              old_data = []
              if os.path.exists(path_db):
                  with open(path_db, 'r', encoding='utf-8') as f:
                      old_data = yaml.safe_load(f) or []
              
