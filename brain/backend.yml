- d: '2026-05-11'
  s: '### 📘 Knowledge: Go (bahasa pemrograman)


    Go (sering disebut sebagai Golang) adalah bahasa pemrograman yang dibuat di Google
    pada tahun 2009 oleh Robert Griesemer, Rob Pike, dan Ken Thompson. Go adalah bahasa
    pemrograman sumber terbuka yang mudah, sederhana, efisien. Selain itu, Go memiliki
    level yang sama dengan Java, Yaitu bahasa pemrograman yang dikompilasi dan menggunakan
    sintaks mirip bahasa C, dengan fitur pengumpulan sampah, penulisan terstruktur,
    keamanan memori, dan pemrograman yang konkuren serta berurutan. Kompiler dan Integrated
    Development Environment (IDE) lainnya disediakan oleh Google dari awal secara
    bebas dan sumber terbuka....'
  t: Go (bahasa pemrograman)
- d: '2026-05-11'
  s: '### 📘 Knowledge: Node.js


    Node.js adalah platform perangkat lunak yang dirancang oleh Ryan Dahl. Node.js
    adalah runtime untuk lingkungan JavaScript di luar peramban web yang dibangun
    di atas mesin JavaScript V8. Node.js dapat dijalankan pada Windows, MacOS, dan
    Linux....'
  t: Node.js
