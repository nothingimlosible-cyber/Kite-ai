  t: Naravit Lertratkosum
- d: '2026-05-11'
  s: '### 📘 Knowledge: Sumber terbuka


    Sumber terbuka (bahasa Inggris: open sourcecode: en is deprecated ) adalah sistem
    pengembangan yang tidak dikoordinasi oleh suatu individu/lembaga pusat, tetapi
    oleh para pelaku yang bekerja sama dengan memanfaatkan kode sumber (source-code)
    yang tersebar dan tersedia bebas (biasanya menggunakan fasilitas komunikasi internet).
    Pola pengembangan ini mengambil model ala bazaar, sehingga pola Open Source ini
    memiliki ciri bagi komunitasnya yaitu adanya dorongan yang bersumber dari budaya
    memberi, yang artinya ketika suatu komunitas menggunakan sebuah program Open Source
    dan telah menerima sebuah manfaat kemudian akan termotivasi untuk menimbulkan
    sebuah pertanyaan apa yang bisa pengguna berikan...'
  t: Sumber terbuka
