- t: Django Unchained
  s: '### Django Unchained

    Django Unchained ( JANG-goh) adalah film Barat revisionis Amerika tahun 2012 yang
    ditulis dan disutradarai oleh Quentin Tarantino. Diproduksi oleh A Band Apart
    milik Tarantino dan Columbia Pictures, film ini dibintangi oleh Jamie Foxx, Christoph
    Waltz, Leonardo DiCaprio, Kerry Washington, dan Samuel L. Jackson; Walton Goggins,
    Dennis Christopher, James Remar, Michael Parks, dan Don Johnson juga membintangi
    peran pendukung. Film ini berlatar di Antebellum South dan Old West, adalah sebuah
    penghormatan revisionis yang sangat bergaya untuk film-film spaghetti Western.
    Judulnya secara khusus meruj'
  d: '2026-05-11'
