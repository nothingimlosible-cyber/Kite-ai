  d: '2026-05-11'
- t: Django Sissoko
  s: '### Django Sissoko

    Django Sissoko, (1948-2022) adalah seorang pegawai negeri sipil Mali yang menjadi
    Perdana Menteri Mali dari Desember 2012 hingga September 2013. Ia adalah Menteri
    Kehakiman dari tahun 1984 sampai 1988 dan kemudian menjabat dua kali sebagai Sekretaris
    Jenderal Kepresidenan, dari 1988 hingga 1991 dan dari 2008 sampai 2011. Dia juga
    menjabat sebagai Ombudsman pada 2011 – 2012.'
  d: '2026-05-11'
