- t: Komputasi awan
  s: '### 📘 Knowledge: Komputasi awan


    Komputasi awan atau komputasi gemawan (bahasa Inggris: cloud computingcode: en
    is deprecated ) adalah gabungan pemanfaatan teknologi komputer (komputasi) dan
    pengembangan berbasis Internet (awan). Awan (cloud) adalah metafora dari internet,
    sebagaimana awan yang sering digambarkan di diagram jaringan komputer. Sebagaimana
    awan dalam diagram jaringan komputer tersebut, awan (cloud) dalam Cloud Computing
    juga merupakan abstraksi dari infrastruktur kompleks yang disembunyikannya. Ia
    adalah suatu metode komputasi di mana kapabilitas terkait teknologi informasi
    disajikan sebagai suatu layanan (as a service), sehingga pengguna dapat mengaksesnya
    lewat Internet (di dalam awan)  tanpa mengetahui apa yang ada di dalamnya, ahli
    dengannya, atau memiliki kendali terhadap infrastruktur teknologi ...


