- t: Kubernetes
  s: '### 📘 Knowledge: Kubernetes


    Kubernetes (, biasanya ditulis sebagai K8s) adalah sistem orkestrasi kontainer
    sumber terbuka untuk mengotomatisasi penerapan, penskalaan, dan manajemen aplikasi
    komputer. Perangkat lunak ini awalnya dirancang oleh Google dan sekarang dikelola
    oleh Cloud Native Computing Foundation. Kubernetes bertujuan menyediakan platform
    untuk mengotomatisasi penyebaran, penskalaan, dan operasi kontainer aplikasi di
    seluruh klaster hos. Kubernetes bekerja dengan berbagai alat kontainer dan menjalankan
    kontainer dalam sebuah cluster, seringkali dengan image yang dibuat menggunakan
    Docker. Kubernetes awalnya berinteraksi dengan runtime Docker melalui Dockershim;
    tetapi, shim sudah tidak digunakan lagi dan digantikan dengan antarmuka langsung
    menggunakan container melalui containerd, atau mengganti Doc...


