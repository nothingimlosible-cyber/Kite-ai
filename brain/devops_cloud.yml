- t: Git
  s: '### 📘 Knowledge: Git


    Git adalah perangkat lunak pengendali versi atau proyek manajemen kode perangkat
    lunak yang diciptakan oleh Linus Torvalds, yang pada awalnya ditujukan untuk pengembangan
    kernel Linux. Desain Git terinspirasi oleh BitKeeper dan Monotone. Git pada awalnya
    hanya dirancang sebagai mesin tingkat rendah yang dapat digunakan oleh tampilan
    muka (front end) lain seperti Cogito atau StGIT. Namun selanjutnya proyek inti
    Git telah berkembang menjadi pengendali revisi lengkap yang dapat digunakan langsung.
    Saat ini, beberapa perangkat lunak terkenal menggunakan Git sebagai pengendali
    revisinya, antara lain kernel Linux, Server X.org, pengembangan inti OLPC (One
    Laptop per Child), serta kerangka kerja web Ruby on Rails....


