- t: Pengujian penetrasi kerucut
  s: '### 📘 Knowledge: Pengujian penetrasi kerucut


    Pengujian penetrasi kerucut (dikenal juga sebagai pengujian penetrometer kerucut,
    sondir, atau CPT) adalah metode yang digunakan untuk menentukan sifat  rekayasa
    geoteknik tanah dan delineasi stratigrafi tanah. Pengujian ini pertama kali dikembangkan
    pada tahun 1950-an di Laboratorium Mekanika Tanah di Delft, Belanda untuk menyelidiki
    tanah lunak. Berdasarkan sejarah ini,  pengujian ini sering kali juga disebut
    sebagai pengujian kerucut Belanda. Saat ini, CPT menjadi salah satu metode penyelidikan
    tanah yang paling sering digunakan dan diterima di seluruh dunia....


    _Source: Wikipedia_'
