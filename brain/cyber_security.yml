- t: Tembok api (komputasi)
  s: '### 📘 Knowledge: Tembok api (komputasi)


    Tembok api, tembok pelindung atau dinding api (bahasa Inggris: firewall) adalah
    suatu sistem yang dirancang untuk mencegah akses yang tidak diinginkan dari atau
    ke dalam suatu jaringan internal. Perangkat lunak yang digunakan untuk menjaga
    keamanan jaringan pribadi dengan cara memblokir akses tidak sah ke atau dari jaringan
    pribadi. Biasanya untuk mencegah pengguna ketika mengakses web yang tidak sah
    atau perangkat lunak tertentu....


