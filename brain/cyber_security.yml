- t: Malwer
  s: '### 📘 Knowledge: Malwer


    Malwer (sebutan untuk perangkat lunak berbahaya) atau perangkat pembahaya adalah
    perangkat lunak apa pun yang sengaja dirancang untuk menyebabkan kerusakan pada
    komputer, peladen, klien, atau jaringan komputer (sebaliknya, perangkat lunak
    yang menyebabkan kerusakan yang tidak disengaja karena beberapa kekurangan biasanya
    digambarkan sebagai kutu perangkat lunak) Berbagai jenis malware ada, termasuk
    virus komputer, cacing komputer, kuda troya, perangkat pemeras, perangkat pengintai,
    perangkat lunak beriklan, dan scareware....


    _Source: Wikipedia_'
  d: '2026-05-11'
- t: Wireshark
  s: '### 📘 Knowledge: Wireshark


    Wireshark adalah penganalisis paket bebas dan sumber terbuka. Perangkat ini digunakan
    untuk pemecahan masalah jaringan, analisis, perangkat lunak dan pengembangan protokol
    komunikasi, dan pendidikan. Awalnya bernama Ethereal, pada Mei 2006 proyek ini
    berganti nama menjadi Wireshark karena masalah merek dagang....


    _Source: Wikipedia_'
