- t: WarVOX
  s: '### 📘 Knowledge: WarVOX


    WarVOX adalah perangkat lunak sumber terbuka yang digunakan untuk melakukan Wardialing
    berbasis Voice over IP (VoIP) guna menjelajahi, mengklasifikasikan, dan mengaudit
