- t: CSS
  s: '### CSS

    Cascading Style Sheet (disingkat CSS) adalah bahasa lembar gaya yang digunakan
    sebagai penentu presentasi dan gaya dokumen yang ditulis dalam bahasa markup seperti
    HTML dan XML. CSS termasuk ke dalam teknologi dasar World Wide Web, bersama dengan
    HTML dan JavaScript.'
  d: '2026-05-11'
- t: Tailwind CSS
  s: '### Tailwind CSS

    Tailwind CSS adalah kerangka kerja (framework) CSS yang di dalamnya terdapat sekumpulan
    utility classes untuk membangun antarmuka kustom dengan cepat. Tailwind CSS berbeda
    dengan kerangka kerja CSS seperti Bootstrap, Bulma, atau Foundation, karena Tailwind
    CSS bukan sebuah UI Framework. Tailwind CSS tidak memiliki tema default maupun
    komponen UI bawaan. Tailwind CSS dirancang agar dapat digunakan oleh pengguna
    sesuai dengan desain kustom yang mereka inginkan.'
  d: '2026-05-11'
