- t: CSS
  s: '### CSS

    Cascading Style Sheet (disingkat CSS) adalah bahasa lembar gaya yang digunakan
    sebagai penentu presentasi dan gaya dokumen yang ditulis dalam bahasa markup seperti
    HTML dan XML. CSS termasuk ke dalam teknologi dasar World Wide Web, bersama dengan
    HTML dan JavaScript.'
  d: '2026-05-11'
- t: Tailwind CSS
  s: '### Tailwind CSS

    Tailwind CSS adalah kerangka kerja (framework) CSS yang di dalamnya terdapat sekumpulan
    utility classes untuk membangun antarmuka kustom dengan cepat. Tailwind CSS berbeda
    dengan kerangka kerja CSS seperti Bootstrap, Bulma, atau Foundation, karena Tailwind
    CSS bukan sebuah UI Framework. Tailwind CSS tidak memiliki tema default maupun
    komponen UI bawaan. Tailwind CSS dirancang agar dapat digunakan oleh pengguna
    sesuai dengan desain kustom yang mereka inginkan.'
  d: '2026-05-11'
- t: Bootstrap (kerangka kerja)
  s: '### Bootstrap (kerangka kerja)

    Bootstrap adalah kerangka kerja CSS yang sumber terbuka dan bebas untuk merancang
    situs web dan aplikasi web. Kerangka kerja ini berisi templat desain berbasis
    HTML dan CSS untuk tipografi, formulir, tombol, navigasi, dan komponen antarmuka
    lainnya, serta juga ekstensi opsional JavaScript. Tidak seperti kebanyakan kerangka
    kerja web lainnya, kerangka kerja ini hanya fokus pada pengembangan front-end
    saja.'
  d: '2026-05-11'
- t: Twitter
  s: '### Twitter

    X, yang sebelumnya Twitter  sebelum Juli 2023, adalah media sosial daring dan
    layanan jejaring sosial yang dioperasikan oleh perusahaan Amerika Serikat, X Corp.,
    penerus Twitter, Inc. Di X, pengguna terdaftar dapat memposting teks, gambar,
    dan video. Pengguna juga dapat memposting, suka (like), posting ulang, memberi
    komentar dan mengutip posting (quote posts), hingga mengirim pesan langsung (DM)
    ke pengguna terdaftar lainnya. '
  d: '2026-05-11'
