- t: PostgreSQL
  s: '### 📘 Knowledge: PostgreSQL


    PostgreSQL (  POHST-gres-kew-EL), atau dikenal juga dengan Postgres, adalah sebuah
    sistem basis data relasional yang menonjolkan ekstensabilitas dan kesesuaian dengan
    SQL. PostgreSQL menggunakan transaksi dengan properti atomisitas (atomicity),
    konsistensi (consistency), isolasi (isolation), dan daya tahan (durability) atau
    sering disebut ACID. PostgreSQL mendukung sebagian besar sistem operasi utama
    seperti Windows, Linux, MacOS, FreeBSD, dan OpenBSD. Selain itu, juga mendukung
    berbagai bidang kerja mulai dari penerapan pada mesin tunggal, gudang data (data
    warehouse), hingga data lake....


    _Source: Wikipedia_'
