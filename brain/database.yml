    Dua fitur yang menarik dari Firebase yaitu Firebase Remote Config dan Firebase
    Realtime Database. Selain itu terdapat fitur pendukung untuk aplikasi yang membutuhkan
    pemberitahuan yaitu Firebase Notification....


