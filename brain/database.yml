- t: Graph database
  s: '### 📘 Knowledge: Graph database


    Graph database (Basis data graf) dalam dunia ilmu komputer adalah basis data yang
    menggunakan struktur data graf yg memiliki komponen simpel (node), tepi (edge)
    dan atribut (properties) untuk merepresentasikan penyimpanan data. Basis data
    graf menyediaakan index-free adjacency, konsep yang memungkinkan penyimpanan dan
    Pemrosesan graf secara efisien. Dalam sistem ini, setiap simpul langsung terhubung
    dengan simpul-simpul yang ada di sekitarnya tanpa perlu menggunakan indeks tambahan
    untuk mencari simpul-simpul tersebut. Artinya, hubungan antar simpul disimpan
    langsung di dalam simpul itu sendiri, sehingga akses ke simpul terrait bisa dilakukan
    secara cepas tanpa pencarían melalui indeks yang terpisah. Pendekatan ini sangat
    berguna dalam aplikasi yang membutuhkan performa tinggi, seperti rek...


    _Source: Wikipedia_'
  d: '2026-05-11'
- t: Firebase
  s: '### 📘 Knowledge: Firebase


    Firebase adalah suatu layanan dari Google yang digunakan untuk mempermudah para
