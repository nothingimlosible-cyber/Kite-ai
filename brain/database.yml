- t: MongoDB
  s: '### 📘 Knowledge: MongoDB


    MongoDB (dari humongous) adalah sistem basis data berorentasi dokumen lintas platform.
    Diklasifikasikan sebagai basis data NoSQL, MongoDB menghindari struktur basis
    data relasional tabel berbasis tradisional yang mendukung JSON seperti dokumen
    dengan skema dinamis (MongoDB menyebutnya sebagai format BSON), membuat integrasi
    data dalam beberapa jenis aplikasi lebih mudah dan lebih cepat. Dirilis di bawah
    Server Side Public License, MongoDB adalah perangkat lunak bebas dan sumber terbuka....


    _Source: Wikipedia_'
