  s: '### 📘 Knowledge: Vue.js


    Vue.js (biasa disebut sebagai Vue; diucapkan , seperti view) adalah kerangka kerja
    JavaScript yang bersifat progresif, bersumber terbuka untuk membangun antarmuka
    pengguna. Integrasi ke dalam proyek yang menggunakan pustaka JavaScript lainnya
    mudah dilakukan dengan Vue karena ia dirancang untuk bisa berjalan hanya di beberapa
    bagian halaman web. Vue juga bisa berfungsi sebagai kerangka kerja aplikasi web
