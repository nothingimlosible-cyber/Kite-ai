- t: JavaScript
  s: '### JavaScript

    JavaScript () (disingkat JS) adalah suatu bahasa pemrograman tingkat tinggi dan
    dinamis. JavaScript populer di internet dan dapat bekerja di sebagian besar penjelajah
    web populer seperti Google Chrome, Internet Explorer (IE), Mozilla Firefox, Netscape
    dan Opera. Kode JavaScript juga dapat disisipkan dalam halaman web menggunakan
    tag script. JavaScript merupakan salah satu teknologi inti World Wide Web selain
    HTML dan CSS. JavaScript membantu membuat halaman web interaktif dan merupakan
    bagian aplikasi web yang esensial.'
  d: '2026-05-11'
- t: HTML
  s: '### HTML

    HyperText Markup Language (HTML) adalah bahasa markah standar untuk dokumen yang
    dirancang untuk ditampilkan di peramban internet. Ini dapat dibantu oleh teknologi
    seperti Cascading Style Sheets (CSS) dan bahasa skrip lainnya seperti JavaScript,
    VBScript, dan PHP.'
  d: '2026-05-11'
- t: Max (aplikasi)
  s: '### Max (aplikasi)

    Max (ditulis seluruhnya dengan huruf kapital; Rusia: Макс, [ˈmaks] MAKS) adalah
    aplikasi layanan pengirim pesan instan dan e-commerce asal Rusia yang dirilis
    oleh VK pada tahun 2025. Max sedang dikembangkan menjadi aplikasi super seperti
    WeChat yang memungkinkan pengguna tidak hanya menggunakannya sebagai jejaring
    sosial, tetapi juga dapat mengakses layanan pemerintah daring, memverifikasi identitas
    melalui ID digital, menggunakan tanda tangan elektronik untuk menandatangani dokumen,
    dan melakukan transaksi pembayaran. Aplikasi ini telah dipromosikan oleh pemerintah
    Rusia sebagai “messenger na'
  d: '2026-05-11'
- t: React
  s: '### React

    React (dikenal juga dengan React.js atau ReactJS) adalah libray JavaScript yang
    digunakan untuk membangun user interface yang interaktif berbasis component. React
    yang dibuat oleh Facebook (sekarang Meta) dan bersifat open source (sumber terbuka),
    sehingga dapat digunakan oleh siapa saja secara gratis. Saat ini React dikelola
    oleh Meta, komunitas, dan perusahaan individu.'
  d: '2026-05-11'
- t: Vue.js
  s: '### Vue.js

    Vue.js (biasa disebut sebagai Vue; diucapkan , seperti view) adalah kerangka kerja
    JavaScript yang bersifat progresif, bersumber terbuka untuk membangun antarmuka
    pengguna. Integrasi ke dalam proyek yang menggunakan pustaka JavaScript lainnya
    mudah dilakukan dengan Vue karena ia dirancang untuk bisa berjalan hanya di beberapa
    bagian halaman web. Vue juga bisa berfungsi sebagai kerangka kerja aplikasi web
    yang mampu menjalankan aplikasi single-page yang canggih. Dengan menggunakan kerangka
    kerja Nuxt.js, Vue.js dapat direpresentasikan secara dini dari sisi server atau
    biasa disebut server side '
  d: '2026-05-11'
- t: React Router
  s: '### React Router

    React Router merupakan kerangka kerja web yang bersifat sumber terbuka. React
    Router digunakan untuk membuat aplikasi web yang menggunakan pustaka React.'
  d: '2026-05-11'
