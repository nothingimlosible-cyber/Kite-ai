- t: JavaScript
  s: '### JavaScript

    JavaScript () (disingkat JS) adalah suatu bahasa pemrograman tingkat tinggi dan
    dinamis. JavaScript populer di internet dan dapat bekerja di sebagian besar penjelajah
    web populer seperti Google Chrome, Internet Explorer (IE), Mozilla Firefox, Netscape
    dan Opera. Kode JavaScript juga dapat disisipkan dalam halaman web menggunakan
    tag script. JavaScript merupakan salah satu teknologi inti World Wide Web selain
    HTML dan CSS. JavaScript membantu membuat halaman web interaktif dan merupakan
    bagian aplikasi web yang esensial.'
  d: '2026-05-11'
- t: HTML
  s: '### HTML

    HyperText Markup Language (HTML) adalah bahasa markah standar untuk dokumen yang
    dirancang untuk ditampilkan di peramban internet. Ini dapat dibantu oleh teknologi
    seperti Cascading Style Sheets (CSS) dan bahasa skrip lainnya seperti JavaScript,
    VBScript, dan PHP.'
  d: '2026-05-11'
- t: Max (aplikasi)
  s: '### Max (aplikasi)

