    aplikasi layanan pengirim pesan instan dan e-commerce asal Rusia yang dirilis
    oleh VK pada tahun 2025. Max sedang dikembangkan menjadi aplikasi super seperti
    WeChat yang memungkinkan pengguna tidak hanya menggunakannya sebagai jejaring
    sosial, tetapi juga dapat mengakses layanan pemerintah daring, memverifikasi identitas
    melalui ID digital, menggunakan tanda tangan elektronik untuk menandatangani dokumen,
    dan melakukan transaksi pembayaran. Aplikasi ini telah dipromosikan oleh pemerintah
    Rusia sebagai “messenger na'
  d: '2026-05-11'
