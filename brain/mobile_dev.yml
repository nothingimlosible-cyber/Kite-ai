- t: Objective-C
  s: '### 📘 Knowledge: Objective-C


    Objective-C adalah bahasa pemrograman tingkat tinggi untuk tujuan umum dan berorientasi
    objek yang menambahkan fitur pengiriman pesan (messaging) gaya Smalltalk ke dalam
    bahasa pemrograman C. Awalnya dikembangkan oleh Brad Cox dan Tom Love pada awal
    1980-an, bahasa ini dipilih oleh NeXT untuk sistem operasi NeXTSTEP mereka. Karena
    garis keturunan langsung dari sistem operasi Apple macOS berasal dari NeXTSTEP,
    Objective-C menjadi bahasa standar yang digunakan, didukung, dan dipromosikan
    oleh Apple untuk mengembangkan aplikasi macOS dan iOS (melalui antarmuka pemrograman
    aplikasi (API) masing-masing, Cocoa dan Cocoa Touch) dari tahun 1997, ketika Apple
    membeli NeXT, hingga pengenalan bahasa Swift pada tahun 2014....


    _Source: Wikipedia_'
