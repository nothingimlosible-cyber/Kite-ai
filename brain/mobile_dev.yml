- t: Boron
  s: '### 📘 Knowledge: Boron


    Boron (bahasa Latin: boriumcode: la is deprecated ) adalah unsur kimia dengan
    lambang B dan nomor atom 5. Dalam bentuk kristalnya, boron merupakan metaloid
    yang rapuh, gelap, dan berkilau; dalam bentuk amorfnya, boron berbentuk bubuk
    kecoklatan. Sebagai unsur yang paling ringan dalam golongan boron, ia memiliki
    tiga elektron valensi untuk membentuk ikatan kovalen, menghasilkan banyak senyawa
    seperti asam borat, mineral natrium borat, serta kristal ultra keras boron karbida
    dan boron nitrida....


    _Source: Wikipedia_'
