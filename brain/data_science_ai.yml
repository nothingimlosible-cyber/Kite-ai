- t: Python (bahasa pemrograman)
  s: '### 📘 Knowledge: Python (bahasa pemrograman)


    Python adalah bahasa pemrograman tujuan umum yang ditafsirkan, tingkat tinggi.
    Dibuat oleh Guido van Rossum dan pertama kali dirilis pada tahun 1991, filosofi
    desain Python menekankan keterbacaan kode dengan penggunaan spasi putih yang signifikan.
    Konstruksi bahasanya dan pendekatan berorientasi objek bertujuan untuk membantu
    pemrogram menulis kode yang jelas dan logis untuk proyek skala kecil dan besar....


    _Source: Wikipedia_'
