    Travis Oliphant menciptakan NumPy dengan memasukkan fitur Numarray ke dalam Numeric,
    serta melakukan modifikasi besar-besaran. NumPy adalah perangkat lunak sumber
    terbuka dan memiliki banyak kontributor....


