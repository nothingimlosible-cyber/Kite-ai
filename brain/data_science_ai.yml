- t: NumPy
  s: '### 📘 Knowledge: NumPy


    NumPy (dieja , atau ) adalah sebuah pustaka untuk bahasa pemrograman Python, NumPy
    memberikan dukungan untuk himpunan dan matriks multidimensi yang besar, dan dilengkapi
    koleksi sejumlah besar fungsi matematika tingkat tinggi untuk beroperasi pada
    himpunan ini. Proyek pendahulu NumPy, Numeric, awalnya dibuat oleh Jim Hugunin
