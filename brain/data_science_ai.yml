  s: '### 📘 Knowledge: Pembelajaran mesin


    Pembelajaran mesin atau pemelajaran mesin (bahasa Inggris: machine learning atau
    disingkat dengan ML) adalah sub-bidang kecerdasan buatan yang berkaitan dengan
    pengembangan dan studi algoritma statistik yang dirancang untuk dapat belajar
    secara mandiri dari data, kemudian menggunakan pembelajaran tersebut untuk menggeneralisasi
