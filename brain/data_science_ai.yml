- t: R (bahasa pemrograman)
  s: '### 📘 Knowledge: R (bahasa pemrograman)


    R (juga dikenal sebagai GNU S) adalah bahasa pemrograman dan perangkat lunak untuk
    analisis statistika dan grafik. R dibuat oleh Ross Ihaka dan Robert Gentleman
    di Universitas Auckland, Selandia Baru, dan kini dikembangkan oleh R Development
    Core Team, di mana Chambers merupakan anggotanya. R dinamakan sebagian setelah
    nama dua pembuatnya (Robert Gentleman dan Ross Ihaka), dan sebagian sebagian dari
    permainan nama dari S....


    _Source: Wikipedia_'
