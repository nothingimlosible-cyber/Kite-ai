- t: NumPy
  s: '### 📘 Knowledge: NumPy


    NumPy (dieja , atau ) adalah sebuah pustaka untuk bahasa pemrograman Python, NumPy
    memberikan dukungan untuk himpunan dan matriks multidimensi yang besar, dan dilengkapi
    koleksi sejumlah besar fungsi matematika tingkat tinggi untuk beroperasi pada
    himpunan ini. Proyek pendahulu NumPy, Numeric, awalnya dibuat oleh Jim Hugunin
    dengan kontribusi dari beberapa pengembang lain pada tahun 1995. Pada tahun 2005,
    Travis Oliphant menciptakan NumPy dengan memasukkan fitur Numarray ke dalam Numeric,
    serta melakukan modifikasi besar-besaran. NumPy adalah perangkat lunak sumber
    terbuka dan memiliki banyak kontributor....


    _Source: Wikipedia_'
