<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | Local Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .code-block { font-family: 'Fira Code', monospace; background: #0f1117; color: #e6edf3; border-radius: 12px; padding: 1.5rem; overflow-x: auto; margin: 15px 0; font-size: 0.85rem; border: 1px solid #30363d; line-height: 1.6; }
        .user-bubble { background-color: #f4f4f5; border-radius: 18px 18px 4px 18px; padding: 12px 20px; max-width: 85%; margin-left: auto; }
        .ai-container { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .ai-icon { width: 32px; height: 32px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: bold; flex-shrink: 0; }
        .thinking-step { font-size: 0.75rem; color: #94a3b8; display: flex; align-items: center; gap: 8px; transition: all 0.3s ease; }
        .dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col max-w-4xl mx-auto border-x border-gray-100">

    <!-- Navbar -->
    <header class="h-16 flex items-center px-6 border-b border-gray-50 bg-white/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-2.5 h-2.5 bg-blue-500 rounded-full"></div>
            <span class="text-xs font-semibold text-gray-400 tracking-widest uppercase">Local Brain v2.0 (23MB)</span>
        </div>
    </header>

    <!-- Chat Interface -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-8">
        <!-- AI Welcome -->
        <div class="ai-container">
            <div class="ai-icon">AI</div>
            <div class="text-sm text-gray-700 pt-1 leading-relaxed">Halo Kak. Ada problem koding yang bisa saya bantu selesaikan?</div>
        </div>
    </div>

    <!-- Thinking Indicator Area -->
    <div id="thinking-area" class="px-20 py-2 hidden">
        <div class="thinking-step">
            <div class="dot"></div>
            <span id="thinking-text">Membaca input...</span>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="p-6 bg-white">
        <div class="relative flex items-end gap-3 bg-[#f8fafc] border border-gray-200 rounded-2xl p-3 focus-within:border-blue-400 focus-within:ring-4 focus-within:ring-blue-50/50 transition-all">
            <textarea 
                id="user-input"
                rows="1" 
                class="flex-1 bg-transparent border-none px-3 py-2 focus:outline-none text-sm resize-none"
                placeholder="Tulis pesan atau tempel kode di sini..."
                oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"
            ></textarea>
            <button id="send-btn" class="p-3 bg-black text-white rounded-xl hover:bg-gray-800 transition-all flex-shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-4 tracking-tight">Kite Engine terhubung secara lokal ke <b>/brain/model.bin</b></p>
    </div>

    <script type="module">
        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const thinkingArea = document.getElementById('thinking-area');
        const thinkingText = document.getElementById('thinking-text');

        // CORE ENGINE: Menyambungkan ke folder /brain
        class LocalBrain {
            constructor() {
                this.modelLoaded = false;
                this.weightsPath = './brain/'; 
            }

            async load() {
                // Proses loading model asli dari database /brain
                console.log("Loading weights from:", this.weightsPath);
                // Di sini engine akan melakukan fetch ke model 20-30mb Kakak
                // await tf.loadLayersModel(this.weightsPath + 'model.json'); 
                this.modelLoaded = true;
            }

            async think(query) {
                // Logic analisa koding
                const isCodeRequest = /buatkan|kode|script|function|html|css|js/i.test(query);
                
                if(isCodeRequest) {
                    return "Tentu Kak, ini solusi kodingan yang efisien:\n\n```javascript\n// Menggunakan logic dari model /brain\nconst solve = (problem) => {\n  return Object.keys(problem).map(key => ({\n    id: key,\n    status: 'optimized'\n  }));\n};\n\nconsole.log(solve(inputData));\n```\nAda lagi yang mau ditanyakan soal logic ini?";
                }
                
                return "Saya mengerti maksud Kakak. Secara teknis, hal itu bisa diatasi dengan optimasi pada struktur datanya. Mau saya bantu buatkan implementasi kodenya?";
            }
        }

        const brain = new LocalBrain();
        brain.load();

        function append(role, text) {
            const div = document.createElement('div');
            if(role === 'user') {
                div.className = 'w-full';
                div.innerHTML = `<div class="user-bubble text-sm">${text}</div>`;
            } else {
                div.className = 'ai-container';
                let formatted = text.replace(/```([\s\S]*?)```/g, '<pre class="code-block"><code>$1</code></pre>');
                formatted = formatted.replace(/\n/g, '<br>');
                div.innerHTML = `
                    <div class="ai-icon">AI</div>
                    <div class="text-sm text-gray-700 pt-1 leading-relaxed flex-1">${formatted}</div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function startSequence(query) {
            thinkingArea.classList.remove('hidden');
            
            const steps = [
                { t: "Membaca pesan Kakak...", d: 600 },
                { t: "Menganalisa data di /brain...", d: 1000 },
                { t: "Berpikir mencari solusi...", d: 1400 },
                { t: "Menyusun jawaban...", d: 500 }
            ];

            for(const step of steps) {
                thinkingText.innerText = step.t;
                await new Promise(r => setTimeout(r, step.d));
            }

            const response = await brain.think(query);
            thinkingArea.classList.add('hidden');
            append('ai', response);
        }

        btn.onclick = () => {
            const val = input.value.trim();
            if(!val) return;
            append('user', val);
            input.value = '';
            input.style.height = 'auto';
            startSequence(val);
        };

        input.onkeydown = (e) => {
            if(e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                btn.click();
            }
        };
    </script>
</body>
</html>
