<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kite AI - Elite Coding Partner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&display=swap');
        body { font-family: 'Fira Code', monospace; background-color: #0d1117; color: #c9d1d9; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        .glow-border:focus { border-color: #58a6ff; box-shadow: 0 0 10px rgba(88, 166, 255, 0.3); outline: none; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-gray-800 p-4 flex justify-between items-center bg-[#161b22]">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <h1 class="text-xl font-bold tracking-tighter text-white">Kite AI <span class="text-blue-400">v2.0</span></h1>
        </div>
        <div class="text-xs text-gray-400">System Status: <span class="text-green-400">ONLINE</span></div>
    </header>

    <!-- Main Chat Area -->
    <main class="flex-1 overflow-hidden flex flex-col">
        <div id="chat-box" class="chat-container flex-1 overflow-y-auto p-6 space-y-6">
            <!-- Initial Message -->
            <div class="flex items-start gap-4">
                <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">K</div>
                <div class="bg-[#161b22] border border-gray-800 p-4 rounded-lg max-w-[80%]">
                    <p class="text-sm">Halo Kak! Saya **Kite AI**. Saya sudah siap bantu Kakak koding apa saja. Mau bikin web, bot, atau cuma mau ngobrol santai? Gas pol!</p>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-6 border-t border-gray-800 bg-[#0d1117]">
            <div class="max-w-4xl mx-auto relative">
                <textarea id="user-input" 
                    class="w-full bg-[#161b22] border border-gray-800 rounded-xl p-4 pr-16 text-sm glow-border resize-none"
                    placeholder="Tulis perintah koding atau pertanyaan di sini..."
                    rows="2"></textarea>
                <button id="send-btn" class="absolute right-4 bottom-4 text-blue-500 hover:text-blue-400 transition-colors">
                    <i class="fas fa-paper-plane text-xl"></i>
                </button>
            </div>
            <p class="text-[10px] text-center mt-2 text-gray-500">Press Enter to send, Shift+Enter for new line.</p>
        </div>
    </main>

    <script src="brain/logic.js"></script>
</body>
</html>
