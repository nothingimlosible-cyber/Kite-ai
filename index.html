<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | Local Neural Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; overflow: hidden; }
        .code-block { font-family: 'Fira Code', monospace; background: #0d1117; color: #e6edf3; border-radius: 12px; padding: 1.25rem; overflow-x: auto; margin: 1rem 0; font-size: 0.85rem; border: 1px solid #30363d; line-height: 1.6; }
        .user-bubble { background-color: #f4f4f5; border-radius: 18px 18px 4px 18px; padding: 12px 20px; max-width: 85%; margin-left: auto; border: 1px solid #e5e7eb; font-size: 0.9rem; }
        .ai-container { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .ai-avatar { width: 32px; height: 32px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px; font-weight: bold; flex-shrink: 0; }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .progress-line { height: 2px; background: #f1f5f9; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: #000; transition: width 0.3s ease; }
        .thinking-step { font-size: 0.75rem; color: #94a3b8; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        .dot { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col max-w-4xl mx-auto border-x border-gray-50 bg-white">

    <!-- Progress Download Model dari /brain -->
    <div class="progress-line"><div id="progress-fill"></div></div>

    <!-- Header -->
    <header class="p-5 border-b border-gray-50 flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div id="led" class="w-2.5 h-2.5 bg-red-500 rounded-full"></div>
            <div class="flex flex-col">
                <span id="engine-status" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Engine Locked</span>
                <span class="text-[9px] text-gray-300 font-mono italic">Database: ./brain/</span>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-8">
        <div class="ai-container">
            <div class="ai-avatar">AI</div>
            <div class="text-sm text-gray-700 pt-1 leading-relaxed" id="welcome-msg">
                Halo Kak. Saya sedang menghubungkan ke folder <b>/brain</b> untuk mengunduh model AI (20-30MB) langsung ke browser Anda. Tunggu sebentar ya...
            </div>
        </div>
    </div>

    <!-- Processing Flow Area -->
    <div id="status-area" class="px-20 py-2 hidden">
        <div class="thinking-step">
            <div class="dot"></div>
            <span id="status-text">Membaca...</span>
        </div>
    </div>

    <!-- Input Section -->
    <div class="p-6 bg-white border-t border-gray-50">
        <div class="relative flex items-end gap-3 bg-[#f8fafc] border border-gray-200 rounded-2xl p-3 focus-within:border-black transition-all">
            <textarea 
                id="user-input"
                rows="1" 
                class="flex-1 bg-transparent border-none px-3 py-2 focus:outline-none text-sm resize-none"
                placeholder="Menunggu sinkronisasi brain..."
                disabled
            ></textarea>
            <button id="send-btn" class="opacity-20 pointer-events-none p-3 bg-black text-white rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
        <p class="text-center text-[9px] text-gray-400 mt-4 tracking-tighter uppercase font-bold">Neural Engine Injected | Source: /brain/</p>
    </div>

    <script type="module">
        // INJEKSI ENGINE ASLI (Transformers.js)
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // SETINGAN ABSOLUT: Paksa engine ambil model dari folder /brain repo Kakak
        env.localModelPath = './brain/'; 
        env.allowRemoteModels = false; // Gak boleh ambil dari luar, harus dari /brain/

        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const fill = document.getElementById('progress-fill');
        const statusText = document.getElementById('status-text');
        const statusArea = document.getElementById('status-area');
        const engineInfo = document.getElementById('engine-status');
        const led = document.getElementById('led');

        let generator;

        // FUNGSI UTAMA: Download Model dari /brain ke Browser
        async function syncBrain() {
            try {
                engineInfo.innerText = "Sinking Neural Brain...";
                
                // Load model (Misal model 'NeuroBERT' atau 'qwen-tiny' yang ada di folder brain)
                // Engine akan otomatis mencari file .json, .onnx, dll di dalam ./brain/
                generator = await pipeline('text-generation', 'model', {
                    progress_callback: (p) => {
                        fill.style.width = p.progress + '%';
                        engineInfo.innerText = `Downloading Brain: ${Math.round(p.progress)}%`;
                    }
                });

                // Sukses Download & Inject
                led.className = "w-2.5 h-2.5 bg-green-500 rounded-full shadow-[0_0_8px_green]";
                engineInfo.innerText = "Engine Online & Real";
                input.disabled = false;
                input.placeholder = "Tanya kodingan apa saja, Kak...";
                btn.classList.remove('opacity-20', 'pointer-events-none');
                document.getElementById('welcome-msg').innerText = "Brain sudah tersinkronisasi. Saya siap membantu kodingan Kakak secara profesional.";

            } catch (err) {
                console.error("Gagal sinkron brain:", err);
                engineInfo.innerText = "Brain Not Found in /brain/";
                led.className = "w-2.5 h-2.5 bg-orange-500 rounded-full";
                // Tetap aktifkan input untuk fallback
                input.disabled = false;
                btn.classList.remove('opacity-20', 'pointer-events-none');
            }
        }

        function appendMsg(role, text) {
            const div = document.createElement('div');
            if(role === 'user') {
                div.innerHTML = `<div class="user-bubble text-sm">${text}</div>`;
            } else {
                div.className = "ai-container";
                let formatted = text.replace(/```([\s\S]*?)```/g, '<pre class="code-block"><code>$1</code></pre>');
                formatted = formatted.replace(/\n/g, '<br>');
                div.innerHTML = `
                    <div class="ai-avatar">AI</div>
                    <div class="text-sm text-gray-700 pt-1 leading-relaxed flex-1">${formatted}</div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function processAI(query) {
            statusArea.classList.remove('hidden');
            
            // SEKUENS MIKIR (Request Kakak)
            const steps = [
                { s: "Membaca...", d: 600 },
                { s: "Menganalisa...", d: 1000 },
                { s: "Berpikir...", d: 1500 },
                { s: "Membalas...", d: 400 }
            ];

            for(let step of steps) {
                statusText.innerText = step.s;
                await new Promise(r => setTimeout(r, step.d));
            }

            try {
                // INFERENSI NYATA: Model mengolah kata demi kata
                const output = await generator(query, { 
                    max_new_tokens: 250, 
                    temperature: 0.7 
                });
                
                statusArea.classList.add('hidden');
                appendMsg('ai', output[0].generated_text);
            } catch (e) {
                statusArea.classList.add('hidden');
                appendMsg('ai', "Maaf Kak, saya gagal memproses data dari brain. Pastikan file model di folder `/brain` sudah lengkap (config.json, model.onnx, tokenizer.json).");
            }
        }

        btn.onclick = () => {
            const val = input.value.trim();
            if(!val) return;
            appendMsg('user', val);
            input.value = '';
            processAI(val);
        };

        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.click(); } };

        // Start Sync
        syncBrain();
    </script>
</body>
</html>
