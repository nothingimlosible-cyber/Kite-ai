<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | Real Brain v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; overflow: hidden; }
        .code-block { font-family: 'Fira Code', monospace; background: #0d1117; color: #adbac7; border-radius: 12px; padding: 1.2rem; overflow-x: auto; margin: 15px 0; font-size: 0.85rem; border: 1px solid #30363d; }
        .user-bubble { background-color: #f0f2f5; border-radius: 18px 18px 4px 18px; padding: 10px 18px; max-width: 80%; margin-left: auto; font-size: 0.9rem; }
        .ai-icon { width: 30px; height: 30px; background: #000; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 9px; font-weight: bold; flex-shrink: 0; }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
        .progress-bar { height: 2px; background: #eee; width: 100%; position: absolute; top: 0; left: 0; overflow: hidden; }
        .progress-fill { height: 100%; background: #000; width: 0%; transition: width 0.3s; }
    </style>
</head>
<body class="h-screen flex flex-col max-w-2xl mx-auto border-x border-gray-100 relative">

    <!-- Loading Bar Download Model -->
    <div id="loader" class="progress-bar">
        <div id="fill" class="progress-fill"></div>
    </div>

    <!-- Header -->
    <header class="p-5 border-b border-gray-50 flex justify-between items-center bg-white/90 backdrop-blur-md">
        <div class="flex flex-col">
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Neural Status</span>
            <span id="engine-status" class="text-xs font-semibold text-orange-500 italic">Mendownload Otak (0%)...</span>
        </div>
        <div id="brain-indicator" class="w-2 h-2 bg-gray-300 rounded-full"></div>
    </header>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-6">
        <div class="flex gap-4">
            <div class="ai-icon">AI</div>
            <div class="text-sm text-gray-600 pt-1">Sistem siap. Menunggu sinkronisasi model dari <b>/brain</b>...</div>
        </div>
    </div>

    <!-- Live Status -->
    <div id="status-area" class="px-16 py-2 hidden">
        <div class="flex items-center gap-3 text-[11px] text-gray-400 font-medium italic">
            <div class="w-1.5 h-1.5 bg-gray-400 rounded-full animate-pulse"></div>
            <span id="status-text">Membaca...</span>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-6 bg-white border-t border-gray-50">
        <div class="relative flex items-center gap-2 bg-[#f8f9fa] rounded-2xl px-4 py-1.5 border border-transparent focus-within:border-gray-200 transition-all">
            <textarea 
                id="user-input"
                rows="1" 
                class="flex-1 bg-transparent border-none py-3 focus:outline-none text-sm resize-none"
                placeholder="Tanya soal koding..."
                disabled
            ></textarea>
            <button id="send-btn" class="opacity-30 pointer-events-none p-2.5 bg-black text-white rounded-xl transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
    </div>

    <script type="module">
        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const fill = document.getElementById('fill');
        const statusText = document.getElementById('status-text');
        const statusArea = document.getElementById('status-area');
        const engineStatus = document.getElementById('engine-status');
        const brainInd = document.getElementById('brain-indicator');

        let modelData = null;

        // FUNGSI UTAMA: Download Model 23MB dari /brain
        async function loadBrain() {
            try {
                // Kita asumsikan ada file besar di /brain/model.bin atau model.json
                const response = await fetch('./brain/model.bin'); 
                const reader = response.body.getReader();
                const contentLength = +response.headers.get('Content-Length') || 24117248; // Estimasi 23MB
                
                let receivedLength = 0;
                let chunks = []; 
                
                while(true) {
                    const {done, value} = await reader.read();
                    if (done) break;
                    chunks.push(value);
                    receivedLength += value.length;
                    
                    let percent = Math.round((receivedLength / contentLength) * 100);
                    fill.style.width = percent + '%';
                    engineStatus.innerText = `Mendownload Otak (${percent}%)...`;
                }

                // Simpan ke memory browser
                modelData = new Uint8Array(receivedLength);
                let position = 0;
                for(let chunk of chunks) {
                    modelData.set(chunk, position);
                    position += chunk.length;
                }

                // Aktifkan AI
                engineStatus.innerText = "Neural Brain Aktif";
                engineStatus.className = "text-xs font-semibold text-green-500";
                brainInd.className = "w-2 h-2 bg-green-500 rounded-full shadow-[0_0_5px_green]";
                input.disabled = false;
                btn.classList.remove('opacity-30', 'pointer-events-none');
                input.placeholder = "Ketik perintah koding...";

            } catch (e) {
                engineStatus.innerText = "Offline Mode (Brain Gagal Load)";
                input.disabled = false;
                btn.classList.remove('opacity-30', 'pointer-events-none');
            }
        }

        function append(role, text) {
            const div = document.createElement('div');
            if(role === 'user') {
                div.innerHTML = `<div class="user-bubble">${text}</div>`;
            } else {
                let formatted = text.replace(/```([\s\S]*?)```/g, '<div class="code-block">$1</div>');
                div.className = "flex gap-4";
                div.innerHTML = `
                    <div class="ai-icon">AI</div>
                    <div class="text-sm text-gray-700 pt-1 leading-relaxed flex-1">${formatted}</div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function thinkProcess(query) {
            statusArea.classList.remove('hidden');
            const seq = ["Membaca...", "Menganalisa data /brain...", "Berpikir...", "Membalas..."];
            for(let s of seq) {
                statusText.innerText = s;
                await new Promise(r => setTimeout(r, 800));
            }
            statusArea.classList.add('hidden');

            // Logic koding asli (Simulasi pemrosesan dari binary modelData)
            let res = "";
            if(query.toLowerCase().includes('buat') || query.toLowerCase().includes('kode')) {
                res = "Berdasarkan data di `/brain`, ini struktur kode paling optimal:\n\n```javascript\n// Hasil Analisa Model 23MB\nconst kiteEngine = () => {\n  const memory = new WebAssembly.Memory({ initial: 256 });\n  console.log('Neural Brain Synced');\n};\n```\nAda lagi yang mau dikembangkan dari logic ini?";
            } else {
                res = "Saya sudah menganalisa input tersebut. Secara arsitektur, itu memerlukan penanganan pada state management. Mau saya buatkan contoh kodenya?";
            }
            append('ai', res);
        }

        btn.onclick = () => {
            const val = input.value.trim();
            if(!val) return;
            append('user', val);
            input.value = '';
            thinkProcess(val);
        };

        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.click(); } };

        // Jalankan download saat halaman dibuka
        loadBrain();
    </script>
</body>
</html>
