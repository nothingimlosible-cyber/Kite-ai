<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITE AI - Neural Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #ececec; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .message-fade { animation: fadeInUp 0.3s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-4 border-b border-white/5 flex justify-between items-center">
        <h1 class="text-emerald-500 font-bold text-xl tracking-tighter">LITE AI</h1>
        <span class="text-[10px] text-gray-500 uppercase tracking-widest">Deep Learning Mode</span>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-64 space-y-6 hide-scroll"></main>

    <footer class="p-6 bg-[#050505] md:px-64">
        <div class="relative max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Tanya sesuatu..." 
                   class="w-full bg-[#121212] border border-white/10 p-4 pr-14 rounded-2xl focus:outline-none focus:border-emerald-600 text-sm shadow-2xl">
            <button onclick="pikirkan()" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-emerald-500">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") pikirkan(); });

        async function pikirkan() {
            const pesan = input.value.trim();
            if(!pesan) return;
            renderChat("user", pesan);
            input.value = "";

            // 1. Ambil Daftar Isi Global (brain_index.json)
            try {
                const responseIndex = await fetch('brain_index.json');
                const indexGlobal = await responseIndex.json();
                
                // 2. Cari file mana yang relevan
                let fileTujuan = "";
                const keywords = pesan.toLowerCase().split(" ");
                
                for (let entry of indexGlobal) {
                    if (keywords.some(k => entry.keys.includes(k))) {
                        fileTujuan = entry.file;
                        break;
                    }
                }

                // 3. Deep Thinking (Ambil data dari file spesifik)
                if (fileTujuan) {
                    const resData = await fetch(fileTujuan);
                    const dataTeks = await resData.text();
                    // Simulasi mikir sejenak
                    setTimeout(() => {
                        renderChat("bot", "Setelah saya cari di gudang " + fileTujuan + ", begini penjelasannya... \n\n" + dataTeks.substring(0, 500) + "...");
                    }, 1000);
                } else {
                    renderChat("bot", "Maaf Lan, data itu belum masuk ke daftar isi saraf saya.");
                }
            } catch (e) {
                renderChat("bot", "Saraf saya sedang maintenance. Cek file brain_index.json kamu!");
            }
        }

        function renderChat(role, text) {
            const isBot = role === "bot";
            const div = document.createElement('div');
            div.className = `flex ${isBot ? 'justify-start' : 'justify-end'} message-fade`;
            div.innerHTML = `<div class="${isBot ? 'text-gray-300' : 'bg-emerald-600 text-white rounded-2xl'} p-3 px-4 max-w-[85%] text-sm shadow-lg leading-relaxed">
                ${isBot ? '<span class="text-emerald-500 font-bold text-[9px] block mb-1">LITE AI</span>' : ''} ${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
