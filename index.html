<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KITE AI · DeepThink Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Fira+Code&display=swap');
        * { scrollbar-width: thin; }
        body { background: #0a0c10; font-family: 'Inter', sans-serif; }
        .chat::-webkit-scrollbar { width: 4px; }
        .chat::-webkit-scrollbar-track { background: #161b22; }
        .chat::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        .message-bot { background: #0d1117; border: 1px solid #21262d; }
        .message-user { background: #1f6feb; border: 1px solid #388bfd; }
        .thinking-step { font-size: 0.75rem; color: #8b949e; border-left: 2px solid #3b82f6; padding-left: 12px; margin: 8px 0; font-family: 'Fira Code', monospace; }
        .typing::after { content: '▊'; animation: blink 1s step-end infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        pre { border-radius: 12px !important; background: #0a0c10 !important; }
        .prose pre { background: #0a0c10 !important; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <div class="bg-[#0d1117] border-b border-[#21262d] px-5 py-3 flex items-center justify-between sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-pulse"></div>
            <h1 class="font-bold text-sm tracking-tight text-white">KITE AI <span class="text-blue-400 text-[10px] font-mono">· deepThink v2</span></h1>
        </div>
        <div id="statusBadge" class="text-[9px] font-mono text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full">🧠 BRAIN_LOADED</div>
    </div>

    <div id="chatContainer" class="flex-1 overflow-y-auto p-4 md:px-64 space-y-5 chat">
        <div class="flex justify-start">
            <div class="message-bot rounded-2xl p-4 max-w-[85%]">
                <div class="text-blue-400 text-[10px] font-bold mb-1">⚡ KITE CORE</div>
                <div class="text-sm text-gray-300">Halo Lan! Gue udah scan folder <span class="font-mono text-blue-300">/brain</span>. Ada 11 file YAML. Tanya apapun tentang coding, gue baca dulu dari knowledge base-ku.</div>
            </div>
        </div>
    </div>

    <div class="p-4 md:px-64 pb-6 bg-gradient-to-t from-[#0a0c10] to-transparent sticky bottom-0">
        <div class="relative">
            <textarea id="userInput" rows="1" placeholder="Tanya KITE AI ..." class="w-full bg-[#0d1117] border border-[#30363d] rounded-2xl p-3 pr-12 text-sm text-white resize-none focus:outline-none focus:border-blue-500"></textarea>
            <button id="sendBtn" class="absolute right-3 bottom-3 text-blue-500 hover:text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const BRAIN_FILES = [
            "brain/backend.yml", "brain/kode_lib.yml", "brain/data_science.yml", "brain/database.yml",
            "brain/devops_security.yml", "brain/frontend.yml", "brain/javascript.yml", "brain/mobile_dev.yml",
            "brain/kepribadian.yml", "brain/python.yml", "brain/web_design.yml"
        ];
        
        let brainCache = new Map(); // nama file -> parsed YAML object

        async function loadAllBrainFiles() {
            const statusDiv = document.getElementById('statusBadge');
            statusDiv.innerHTML = "📡 LOADING_BRAIN...";
            for (const file of BRAIN_FILES) {
                try {
                    const res = await fetch(file);
                    if (res.ok) {
                        const text = await res.text();
                        const parsed = jsyaml.load(text);
                        if (parsed && typeof parsed === 'object') {
                            brainCache.set(file, parsed);
                        }
                    }
                } catch(e) { console.warn(`gagal load ${file}`, e); }
            }
            statusDiv.innerHTML = `🧠 ${brainCache.size} BRAIN_CORES ACTIVE`;
        }

        function searchInBrain(query) {
            const lowerQuery = query.toLowerCase();
            let bestMatch = { score: 0, answer: null, source: null };
            
            for (const [file, content] of brainCache.entries()) {
                let fileScore = 0;
                let answerText = null;
                
                // Cari di semua field yang mengandung 's:' atau 'answer'
                const stringified = JSON.stringify(content).toLowerCase();
                if (stringified.includes(lowerQuery)) fileScore += 10;
                
                // Jika ada field 's', 'solution', 'answer' -> prioritas
                if (content.s && content.s.toLowerCase().includes(lowerQuery)) {
                    fileScore += 50;
                    answerText = content.s;
                } else if (content.answer && content.answer.toLowerCase().includes(lowerQuery)) {
                    fileScore += 40;
                    answerText = content.answer;
                } else if (content.solution && content.solution.toLowerCase().includes(lowerQuery)) {
                    fileScore += 30;
                    answerText = content.solution;
                }
                
                // Ambil teks dari properti manapun yang relevan
                if (!answerText && content.s) answerText = content.s;
                else if (!answerText && content.answer) answerText = content.answer;
                else if (!answerText && content.solution) answerText = content.solution;
                else if (!answerText && typeof content === 'string') answerText = content;
                
                if (fileScore > bestMatch.score && answerText) {
                    bestMatch = { score: fileScore, answer: answerText, source: file };
                }
            }
            
            return bestMatch;
        }

        async function simulateThinking(query, stepsCallback) {
            stepsCallback("🔍 Scanning neural pathways...");
            await new Promise(r => setTimeout(r, 400));
            stepsCallback(`📂 Accessing ${brainCache.size} brain modules...`);
            await new Promise(r => setTimeout(r, 300));
            stepsCallback("⚙️ Correlating with query: " + query.slice(0, 40) + (query.length > 40 ? "..." : ""));
            await new Promise(r => setTimeout(r, 500));
            stepsCallback("🧠 Retrieving best solution...");
            await new Promise(r => setTimeout(r, 400));
        }

        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function addMessage(content, isUser = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-4 fade-in`;
            wrapper.innerHTML = `
                <div class="${isUser ? 'message-user text-white' : 'message-bot text-gray-200'} rounded-2xl p-3 px-4 max-w-[85%] text-sm shadow-md">
                    ${!isUser ? '<div class="text-blue-400 text-[10px] font-bold mb-1">🧠 KITE DEEPTHINK</div>' : ''}
                    <div class="prose prose-invert prose-sm max-w-none">${isUser ? escapeHtml(content) : marked.parse(content)}</div>
                </div>
            `;
            chatContainer.appendChild(wrapper);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            if (!isUser) {
                document.querySelectorAll('pre code').forEach(block => hljs.highlightElement(block));
            }
        }

        function escapeHtml(str) {
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        async function handleUserMessage() {
            const query = userInput.value.trim();
            if (!query) return;
            addMessage(query, true);
            userInput.value = '';
            userInput.style.height = 'auto';

            // Tampilkan bubble dengan loading steps
            const thinkingBubble = document.createElement('div');
            thinkingBubble.className = "flex justify-start mb-4";
            thinkingBubble.innerHTML = `
                <div class="message-bot rounded-2xl p-3 max-w-[85%]">
                    <div class="text-blue-400 text-[10px] font-bold mb-1">⚙️ THINKING PROCESS</div>
                    <div id="thinkingSteps" class="space-y-1"></div>
                </div>
            `;
            chatContainer.appendChild(thinkingBubble);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            const stepsDiv = document.getElementById('thinkingSteps');
            const addStep = (text) => {
                const p = document.createElement('div');
                p.className = "thinking-step text-[11px]";
                p.innerHTML = text;
                stepsDiv.appendChild(p);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };
            
            await simulateThinking(query, addStep);
            
            // Cari jawaban di brain yang sudah di-cache
            const result = searchInBrain(query);
            
            thinkingBubble.remove();
            
            if (result.answer && result.score > 0) {
                let finalAnswer = result.answer;
                // Tambahkan metadata sumber
                const sourceFile = result.source.replace('brain/', '').replace('.yml', '');
                finalAnswer += `\n\n---\n📚 *Referensi dari:* \`${sourceFile}\` • *Confidence:* ${Math.min(95, result.score)}%`;
                addMessage(finalAnswer, false);
            } else {
                addMessage("Maaf Lan, gue udah buka semua file brain (`backend.yml`, `python.yml`, dll) tapi gak nemu info yang cocok. Coba tanya lebih spesifik atau tambahin ilmunya di folder brain.", false);
            }
        }

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleUserMessage();
            }
        });
        sendBtn.addEventListener('click', handleUserMessage);
        
        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
        
        loadAllBrainFiles().then(() => {
            console.log("Brain loaded:", brainCache.size);
        });
    </script>
</body>
</html>
