<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kite-ai | Neural Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Courier New', Courier, monospace; }
        .neon-border { border: 1px solid #00ffcc; box-shadow: 0 0 15px #00ffcc; }
        .glass { background: rgba(0, 255, 204, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="min-h-screen p-5">
    <div class="max-w-4xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-bold tracking-tighter mb-2">KITE-AI <span class="text-white">ELITE</span></h1>
            <p class="text-xs opacity-70">SYSTEM STATUS: <span id="ai-status" class="text-yellow-400">Loading Brains...</span></p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Miner Status -->
            <div class="neon-border p-6 glass rounded-lg">
                <h2 class="text-xl mb-4 font-bold border-b border-cyan-900 pb-2">⚡ AUTO-MINER</h2>
                <div class="space-y-3">
                    <div class="flex justify-between"><span>Status:</span> <span class="text-green-400">ACTIVE</span></div>
                    <div class="flex justify-between"><span>Interval:</span> <span>30 Mins</span></div>
                    <div class="flex justify-between"><span>Workflow:</span> <span class="text-blue-400">core-sync.yml</span></div>
                </div>
            </div>

            <!-- Neural Interface -->
            <div class="neon-border p-6 glass rounded-lg">
                <h2 class="text-xl mb-4 font-bold border-b border-cyan-900 pb-2">🧠 NEURO-BERT BACKUP</h2>
                <textarea id="ai-input" class="w-full bg-black border border-cyan-800 p-2 text-sm focus:outline-none mb-3" rows="3" placeholder="Tanya sesuatu ke NeuroBERT..."></textarea>
                <button onclick="askAI()" class="w-full bg-cyan-600 text-black font-bold py-2 hover:bg-cyan-400 transition-all">EKSEKUSI</button>
                <div id="ai-output" class="mt-4 text-[10px] text-gray-400 overflow-hidden italic"></div>
            </div>
        </div>

        <footer class="mt-20 text-center text-[10px] opacity-30">
            KITE-AI CORE v2.0 | NEURO-BERT INTEGRATED
        </footer>
    </div>

    <script type="module">
        import kiteBrain from './brain/logic.js';
        
        window.askAI = async () => {
            const input = document.getElementById('ai-input').value;
            const outputEl = document.getElementById('ai-output');
            outputEl.innerText = "Berpikir...";
            
            const response = await kiteBrain.processQuery(input);
            outputEl.innerText = response;
        }
    </script>
</body>
</html>
