<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITE AI | Coder Mode v1.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;600&display=swap');
        
        body { 
            background: #0d1117; 
            color: #c9d1d9; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
        }

        code, pre { font-family: 'Fira Code', monospace !important; }
        
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        /* Styling Markdown Content */
        .prose pre {
            background: #161b22 !important;
            border: 1px solid #30363d;
            padding: 1rem;
            border-radius: 8px;
            margin: 10px 0;
            overflow-x: auto;
        }
        .prose code { color: #ff7b72; background: transparent; padding: 0; }
        .prose strong { color: #58a6ff; }
        
        .fade-in { animation: fadeInUp 0.3s ease-out; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 border-b border-[#30363d] bg-[#161b22]/90 backdrop-blur flex justify-between items-center z-10">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_10px_#3b82f6]"></div>
            <h1 class="font-bold tracking-tighter text-white text-lg">KITE AI <span class="text-blue-500 text-xs font-mono">CODER_CORE</span></h1>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[10px] text-gray-500 font-mono uppercase tracking-widest">Neural Mode: Active</span>
            <span id="status" class="text-[9px] text-emerald-500 font-mono">STANDBY</span>
        </div>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-60 space-y-6 chat-container pb-24">
        <div class="flex justify-start fade-in">
            <div class="bg-[#21262d] border border-[#30363d] p-4 rounded-2xl max-w-[90%] text-sm shadow-lg">
                <span class="text-blue-400 font-black text-[9px] uppercase block mb-2 tracking-widest">Kite Engine</span>
                Halo Lan! Sistem <b>Coder v1.0</b> aktif. <br>Tanya saya soal baris kode atau logika pemrograman.
            </div>
        </div>
    </main>

    <footer class="p-6 fixed bottom-0 w-full md:px-60 bg-gradient-to-t from-[#0d1117] via-[#0d1117] to-transparent">
        <div class="relative flex items-center max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Ketik perintah koding..." 
                   class="w-full bg-[#161b22] border border-[#30363d] p-4 pr-16 rounded-2xl focus:outline-none focus:border-blue-500/50 text-sm transition-all shadow-2xl">
            <button onclick="handleChat()" class="absolute right-4 text-blue-500 hover:scale-110 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                </svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');
        const statusText = document.getElementById('status');

        // Kata bantu yang diabaikan agar pencarian fokus ke keyword teknis
        const STOPWORDS = new Set(['apa','bagaimana','cara','buatkan','tolong','sih','itu','ini','di','ke','dan','yang','ada','dong','bang','lan','ai']);

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });

        async function handleChat() {
            const val = input.value.trim();
            if(!val) return;

            renderMsg(val, true);
            input.value = "";
            const loading = renderLoading();
            statusText.innerText = "PROCESSING...";
            statusText.classList.replace('text-emerald-500', 'text-blue-500');
            
            try {
                // Fetch data dari database YAML di folder brain/
                const response = await fetch('brain/code_lib.yml');
                if (!response.ok) throw new Error("File database tidak ditemukan");
                
                const dataTeks = await response.text();

                // Tokenisasi input
                const kueri = val.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(k => k.length > 1 && !STOPWORDS.has(k));

                const jawaban = cariSolusi(dataTeks, kueri);
                
                await new Promise(r => setTimeout(r, 600)); // Delay biar kerasa mikir
                removeEl(loading);
                
                if (jawaban) {
                    renderMsg(jawaban, false);
                } else {
                    renderMsg("Maaf Lan, kode tersebut belum terindeks di `code_lib.yml`. Coba kata kunci lain seperti 'JavaScript Fetch' atau 'Python Loop'.", false);
                }

            } catch (err) {
                removeEl(loading);
                renderMsg("⚠️ **Koneksi Gagal:** Pastikan file `brain/code_lib.yml` sudah ada di folder yang benar.", false);
                console.error(err);
            } finally {
                statusText.innerText = "STANDBY";
                statusText.classList.replace('text-blue-500', 'text-emerald-500');
            }
        }

        function cariSolusi(data, kueri) {
            const blocks = data.split(/\n-\s/);
            let best = null;
            let maxScore = -1;

            for (let block of blocks) {
                let score = 0;
                const lowBlock = block.toLowerCase();
                
                kueri.forEach(k => {
                    if (lowBlock.includes(k)) score += 10; // Skor tinggi jika cocok keyword
                });

                if (score > 0 && score >= maxScore) {
                    // Regex untuk ambil isi s: (jawaban)
                    const match = block.match(/s:\s*([\s\S]*?)\s*(?=d:|t:|$)/);
                    if (match && match[1]) {
                        maxScore = score;
                        best = match[1]
                            .replace(/^['"]|['"]$/g, '') // Hapus kutip YAML
                            .replace(/\\n/g, '\n') // Perbaiki newline
                            .trim();
                    }
                }
            }
            return best;
        }

        function renderMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} fade-in mb-4`;
            
            // Render markdown jika bot, teks biasa jika user
            const content = isUser ? text : marked.parse(text);
            
            div.innerHTML = `
                <div class="${isUser ? 'bg-blue-600 text-white' : 'bg-[#21262d] border border-[#30363d] text-gray-200'} p-4 rounded-2xl max-w-[85%] text-sm shadow-xl">
                    ${!isUser ? '<span class="text-blue-400 font-black text-[9px] uppercase block mb-2 tracking-widest">Kite Coder Core</span>' : ''}
                    <div class="prose prose-invert max-w-none">${content}</div>
                </div>`;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // Highlight kode menggunakan Highlight.js
            document.querySelectorAll('pre code').forEach((el) => { hljs.highlightElement(el); });
        }

        function renderLoading() {
            const id = 'load-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start mb-4 animate-pulse";
            div.innerHTML = `<div class="bg-[#161b22] border border-blue-500/20 text-blue-500 text-[9px] px-4 py-2 rounded-full font-bold tracking-tighter">SCANNING NEURAL REPOSITORY...</div>`;
            chatBox.appendChild(div);
            return id;
        }

        function removeEl(id) { const e = document.getElementById(id); if(e) e.remove(); }
    </script>
</body>
</html>
