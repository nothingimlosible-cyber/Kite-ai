<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITE AI - Neural Core v6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { background: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; overflow: hidden; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .bot-bubble { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); }
        .user-bubble { background: #10b981; color: white; border-radius: 20px 20px 4px 20px; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-5 border-b border-white/5 flex justify-between items-center bg-[#050505]/90 backdrop-blur-xl sticky top-0 z-20">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-emerald-500 rounded-full shadow-[0_0_10px_#10b981]"></div>
            <span class="text-white font-extrabold tracking-tighter text-2xl">LITE AI</span>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[9px] text-gray-500 uppercase font-black tracking-[0.2em]">Neural Engine v6.0</span>
            <span class="text-[10px] text-emerald-500/70 font-mono">ULTRA RETRIEVAL</span>
        </div>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-64 space-y-8 hide-scroll pb-32">
        <div class="flex justify-start fade-in">
            <div class="bot-bubble text-gray-300 p-4 px-6 rounded-2xl max-w-[90%] text-sm leading-relaxed shadow-2xl">
                <span class="text-emerald-500 font-black text-[9px] uppercase block mb-2 tracking-widest text-left">System</span>
                Sistem aktif. Menunggu input saraf dari Lan...
            </div>
        </div>
    </main>

    <footer class="p-6 fixed bottom-0 w-full md:px-64 bg-gradient-to-t from-[#050505] via-[#050505] to-transparent">
        <div class="relative flex items-center max-w-4xl mx-auto group">
            <input type="text" id="userInput" placeholder="Tanya sesuatu..." 
                   class="w-full bg-[#121212] border border-white/10 p-4 pr-16 rounded-2xl focus:outline-none focus:border-emerald-600/50 text-sm transition-all shadow-2xl">
            <button onclick="prosesChat()" class="absolute right-4 text-emerald-500 hover:scale-110 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                </svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") prosesChat(); });

        async function prosesChat() {
            const pesan = input.value.trim();
            if(!pesan) return;

            addMsg("user", pesan);
            input.value = "";
            const loadId = addThinking();

            try {
                // 1. Ambil Index
                const resIndex = await fetch('brain_index.json');
                const indexGlobal = await resIndex.json();

                // 2. Scan File Relevan
                let targetFile = "";
                const kueri = pesan.toLowerCase().split(/\s+/);
                
                for (let entry of indexGlobal) {
                    if (kueri.some(k => k.length > 2 && entry.keys.includes(k))) {
                        targetFile = entry.file;
                        break;
                    }
                }

                let jawaban = "Waduh Lan, saraf saya belum nyampe ke sana. Coba suntik data baru lagi!";

                // 3. Deep Vacuum Scraper (Sedot Data Sampai Tuntas)
                if (targetFile) {
                    const resData = await fetch(targetFile);
                    const dataTxt = await resData.text();
                    const lines = dataTxt.split('\n');
                    
                    let teksFull = "";
                    let ditemukan = false;

                    for(let i=0; i < lines.length; i++){
                        // Cari baris t:
                        if(lines[i].toLowerCase().includes(kueri[0])){
                            // Scan ke bawah mencari baris s:
                            for(let j=i+1; j < i+10; j++){
                                if(lines[j] && lines[j].trim().startsWith('s:')){
                                    // Mulai sedot baris pertama s:
                                    teksFull = lines[j].split(/s:\s*/)[1] || "";
                                    
                                    // LANJUT SEDOT baris di bawahnya sampai ketemu item baru (- id: atau t:)
                                    for(let k=j+1; k < lines.length; k++){
                                        const cleanLine = lines[k].trim();
                                        // Berhenti jika ketemu penanda data selanjutnya
                                        if(cleanLine.startsWith('- id:') || cleanLine.startsWith('t:') || cleanLine.startsWith('d:')){
                                            break;
                                        }
                                        // Tambahkan teks baris selanjutnya
                                        teksFull += " " + cleanLine;
                                    }
                                    ditemukan = true;
                                    break;
                                }
                            }
                        }
                        if(ditemukan) break;
                    }
                    if(ditemukan) jawaban = teksFull.replace(/^["']|["']$/g, '').trim();
                }
                
                setTimeout(() => {
                    document.getElementById(loadId).remove();
                    addMsg("bot", jawaban);
                }, 500);

            } catch (err) {
                if(document.getElementById(loadId)) document.getElementById(loadId).remove();
                addMsg("bot", "Saraf terputus! Pastikan robot sudah running dan file brain_index.json ada.");
            }
        }

        function addMsg(role, text) {
            const isBot = role === "bot";
            const div = document.createElement('div');
            div.className = `flex ${isBot ? 'justify-start' : 'justify-end'} fade-in mb-6`;
            div.innerHTML = `
                <div class="${isBot ? 'bot-bubble text-gray-300' : 'user-bubble shadow-lg'} p-4 px-6 max-w-[85%] text-sm leading-relaxed shadow-xl">
                    ${isBot ? '<span class="text-emerald-500 font-black text-[9px] uppercase block mb-2 tracking-[0.2em] text-left">LITE AI Core</span>' : ''}
                    ${text}
                </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addThinking() {
            const id = "t-" + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start animate-pulse mb-6";
            div.innerHTML = `<div class="bg-white/5 text-gray-500 p-2 px-4 rounded-xl text-[9px] font-bold tracking-widest uppercase">Deep Scanning Neural Data...</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }
    </script>
</body>
</html>
