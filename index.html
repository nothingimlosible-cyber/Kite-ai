<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITE AI | Multi-Neural Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@300;400;600;800&display=swap');
        body { background: #0d1117; color: #c9d1d9; font-family: 'Inter', sans-serif; overflow: hidden; }
        code, pre { font-family: 'Fira Code', monospace !important; }
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        .prose pre { background: #161b22 !important; border: 1px solid #30363d; padding: 1.25rem; border-radius: 12px; margin: 15px 0; overflow-x: auto; }
        .fade-in { animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="p-4 border-b border-[#30363d] bg-[#161b22] flex justify-between items-center z-10 shadow-lg">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-blue-500 rounded-full shadow-[0_0_15px_#3b82f6] animate-pulse"></div>
            <h1 class="font-black tracking-tighter text-white text-xl uppercase">Kite AI <span class="text-blue-500 text-[10px] font-mono border border-blue-500/30 px-1 rounded">CORE_v1</span></h1>
        </div>
        <div class="flex flex-col items-end text-[9px] text-emerald-500 font-mono tracking-widest font-bold">READY</div>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-64 space-y-8 chat-container pb-32">
        <div class="flex justify-start fade-in">
            <div class="bg-[#21262d] border border-[#30363d] p-5 rounded-2xl max-w-[90%] text-sm shadow-2xl">
                <span class="text-blue-400 font-black text-[10px] uppercase block mb-2 tracking-[0.2em]">Neural Engine</span>
                Halo Lan! Sistem Multi-Core aktif. Saya siap membantu koding <b>JavaScript, Python, Web, dan Database</b>. Tanya yuk!
            </div>
        </div>
    </main>

    <footer class="p-6 fixed bottom-0 w-full md:px-64 bg-gradient-to-t from-[#0d1117] via-[#0d1117] to-transparent">
        <div class="relative flex items-center max-w-4xl mx-auto group">
            <input type="text" id="userInput" placeholder="Tanya soal koding..." class="w-full bg-[#161b22] border border-[#30363d] p-4 pr-16 rounded-2xl focus:outline-none focus:border-blue-500/60 text-sm transition-all shadow-2xl">
            <button onclick="handleChat()" class="absolute right-4 text-blue-500 hover:scale-110 active:scale-95 transition-all p-2">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');
        const CORES = ['brain/javascript.yml', 'brain/python.yml', 'brain/web_design.yml', 'brain/database.yml'];
        const STOPWORDS = new Set(['apa','bagaimana','cara','buatkan','tolong','sih','itu','ini','di','ke','dan','yang','adalah','lan','ai']);

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });

        async function handleChat() {
            const val = input.value.trim(); if(!val) return;
            renderMsg(val, true); input.value = "";
            const loading = renderLoading();
            
            try {
                let finalAnswer = null;
                const kueri = val.toLowerCase().replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(k => k.length > 1 && !STOPWORDS.has(k));

                for (const core of CORES) {
                    try {
                        const res = await fetch(core);
                        if (!res.ok) continue;
                        const dataTeks = await res.text();
                        const found = cariSolusi(dataTeks, kueri);
                        if (found) { finalAnswer = found; break; }
                    } catch (e) { }
                }

                await new Promise(r => setTimeout(r, 600));
                removeEl(loading);
                renderMsg(finalAnswer || "Kode belum terindeks, Robot sedang mencari data baru...", false);
            } catch (err) {
                removeEl(loading);
                renderMsg("⚠️ Koneksi gagal. Pastikan database di folder `brain/` sudah ada.", false);
            }
        }

        function cariSolusi(data, kueri) {
            const blocks = data.split(/\n-\s/);
            let best = null, maxScore = -1;
            for (let block of blocks) {
                let score = 0; const lowBlock = block.toLowerCase();
                kueri.forEach(k => { if (lowBlock.includes(k)) score += 10; });
                if (score > 0 && score >= maxScore) {
                    const match = block.match(/s:\s*([\s\S]*?)\s*(?=d:|t:|$)/);
                    if (match && match[1]) {
                        maxScore = score;
                        best = match[1].replace(/^['"]|['"]$/g, '').replace(/\\n/g, '\n').trim();
                    }
                }
            }
            return best;
        }

        function renderMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-6 fade-in`;
            const content = isUser ? text : marked.parse(text);
            div.innerHTML = `<div class="${isUser ? 'bg-blue-600 text-white' : 'bg-[#21262d] border border-[#30363d] text-gray-200'} p-4 px-6 rounded-2xl max-w-[85%] text-sm shadow-xl leading-relaxed">
                ${!isUser ? '<span class="text-blue-400 font-bold text-[9px] uppercase block mb-1">Kite Core</span>' : ''}
                <div class="prose prose-invert max-w-none">${content}</div>
            </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            document.querySelectorAll('pre code').forEach((el) => { hljs.highlightElement(el); });
        }

        function renderLoading() {
            const id = 'load-' + Date.now();
            const div = document.createElement('div');
            div.id = id; div.className = "flex justify-start mb-6 animate-pulse";
            div.innerHTML = `<div class="bg-[#161b22] border border-blue-500/20 text-blue-500 text-[9px] px-5 py-2 rounded-full font-black tracking-widest">MINING_DATA...</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }

        function removeEl(id) { const e = document.getElementById(id); if(e) e.remove(); }
    </script>
</body>
</html>
