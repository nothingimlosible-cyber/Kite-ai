<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITE AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #d1d1d1; font-family: 'Inter', sans-serif; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .fade-in { animation: fadeInUp 0.4s ease-out; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="p-5 border-b border-white/5 flex justify-between bg-[#050505]/80 backdrop-blur-md sticky top-0 z-20">
        <span class="text-emerald-500 font-black tracking-tighter text-2xl">LITE AI</span>
        <div class="flex flex-col items-end">
            <span class="text-[9px] text-gray-500 uppercase font-bold tracking-widest">Neural Link v5</span>
            <div id="status" class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse mt-1"></div>
        </div>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-64 space-y-8 hide-scroll pb-24"></main>

    <footer class="p-6 bg-gradient-to-t from-[#050505] to-transparent fixed bottom-0 w-full md:px-64">
        <div class="relative flex items-center max-w-4xl mx-auto group">
            <input type="text" id="userInput" placeholder="Tanya sesuatu ke AI-mu..." 
                   class="w-full bg-[#111] border border-white/10 p-4 pr-16 rounded-2xl focus:outline-none focus:border-emerald-600 text-sm transition-all shadow-2xl">
            <button onclick="prosesChat()" class="absolute right-4 text-emerald-500 hover:scale-110 active:scale-90 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        input.addEventListener("keypress", (e) => { if(e.key === "Enter") prosesChat(); });

        async function prosesChat() {
            const pesan = input.value.trim();
            if(!pesan) return;

            addMsg("user", pesan);
            input.value = "";
            const loadId = addThinking();

            try {
                // 1. Ambil Index Saraf
                const resIndex = await fetch('brain_index.json');
                const indexGlobal = await resIndex.json();

                // 2. Scan Kecocokan
                let targetFile = "";
                const kueri = pesan.toLowerCase().split(" ");
                
                for (let entry of indexGlobal) {
                    if (kueri.some(k => k.length > 3 && entry.keys.includes(k))) {
                        targetFile = entry.file;
                        break;
                    }
                }

                // 3. Ambil Data Spesifik
                let jawaban = "Maaf Lan, data itu belum terpetakan di memori saraf saya. Coba suntik di Colab!";
                if (targetFile) {
                    const resData = await fetch(targetFile);
                    const dataTxt = await resData.text();
                    // Pencarian string sederhana di file YAML
                    const lines = dataTxt.split('\n');
                    for(let i=0; i<lines.length; i++){
                        if(lines[i].toLowerCase().includes(kueri[0]) && lines[i+1]?.includes('s:')){
                            jawaban = lines[i+1].split('s:')[1].trim();
                            break;
                        }
                    }
                }
                
                document.getElementById(loadId).remove();
                addMsg("bot", jawaban);

            } catch (err) {
                document.getElementById(loadId).remove();
                addMsg("bot", "Saraf terputus. Pastikan robot sudah jalan pertama kali.");
            }
        }

        function addMsg(role, text) {
            const isBot = role === "bot";
            const div = document.createElement('div');
            div.className = `flex ${isBot ? 'justify-start' : 'justify-end'} fade-in mb-6`;
            div.innerHTML = `<div class="${isBot ? 'text-gray-300' : 'bg-emerald-600 text-white rounded-2xl'} p-3 px-5 max-w-[85%] text-sm leading-relaxed shadow-xl">
                ${isBot ? '<span class="text-emerald-500 font-black text-[9px] uppercase block mb-1">LITE AI Core</span>' : ''} ${text}</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function addThinking() {
            const id = "t-" + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start animate-pulse";
            div.innerHTML = `<div class="bg-white/5 text-gray-500 p-2 px-4 rounded-xl text-[10px]">AI sedang memproses saraf...</div>`;
            chatBox.appendChild(div);
            return id;
        }
    </script>
</body>
</html>
