<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | Real Neural Injected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #111; scroll-behavior: smooth; }
        .code-block { font-family: 'Fira Code', monospace; background: #0d1117; color: #adbac7; border-radius: 10px; padding: 1.25rem; overflow-x: auto; margin: 1rem 0; font-size: 0.85rem; border: 1px solid #30363d; line-height: 1.6; }
        .user-bubble { background-color: #f3f4f6; border-radius: 18px 18px 2px 18px; padding: 10px 16px; max-width: 85%; margin-left: auto; font-size: 0.9rem; }
        .ai-bubble { padding: 1rem 0; width: 100%; display: flex; gap: 1rem; border-bottom: 1px solid #f9fafb; }
        .ai-avatar { width: 32px; height: 32px; background: #000; color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; flex-shrink: 0; }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #eee; border-radius: 10px; }
        .progress-container { height: 2px; background: #f0f0f0; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; }
        #progress-fill { height: 100%; width: 0%; background: #000; transition: width 0.3s; }
        .status-msg { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #94a3b8; font-weight: 500; }
        .dot-pulse { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body class="h-screen flex flex-col max-w-3xl mx-auto border-x border-gray-100">

    <!-- Real Download Progress -->
    <div class="progress-container"><div id="progress-fill"></div></div>

    <!-- Header -->
    <header class="p-5 border-b border-gray-50 flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div id="status-led" class="w-2 h-2 bg-red-500 rounded-full"></div>
            <div class="flex flex-col">
                <span id="engine-info" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Engine Locked</span>
                <span class="text-[9px] text-gray-300 font-mono italic">Database: ./brain/</span>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-8">
        <div class="ai-bubble">
            <div class="ai-avatar">AI</div>
            <div class="text-sm text-gray-700 pt-1 leading-relaxed" id="init-text">
                Menghubungkan Engine ke <b>/brain</b>... Sedang men-download bobot model asli.
            </div>
        </div>
    </div>

    <!-- Process Sequence -->
    <div id="thinking-status" class="px-20 py-2 hidden">
        <div class="status-msg">
            <div class="dot-pulse"></div>
            <span id="status-label">Membaca...</span>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="p-6 bg-white border-t border-gray-50">
        <div class="relative flex items-center gap-3 bg-[#f9fafb] border border-gray-200 rounded-2xl px-4 py-2 focus-within:border-black transition-all">
            <textarea 
                id="user-input"
                rows="1" 
                class="flex-1 bg-transparent border-none py-2 focus:outline-none text-sm resize-none"
                placeholder="Tunggu model sinkron..."
                disabled
            ></textarea>
            <button id="send-btn" class="opacity-20 pointer-events-none p-2.5 bg-black text-white rounded-xl">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
    </div>

    <script type="module">
        // INJEKSI ENGINE ASLI (Transformers.js)
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // SETINGAN ABSOLUT: Ambil data dari folder /brain
        env.localModelPath = './brain/'; 
        env.allowRemoteModels = false; // Gak boleh nyolong dari internet, harus dari repo Kakak

        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const fill = document.getElementById('progress-fill');
        const info = document.getElementById('engine-info');
        const led = document.getElementById('status-led');
        const thinkArea = document.getElementById('thinking-status');
        const statusLabel = document.getElementById('status-label');

        let generator;

        // Fungsi Load Model Asli
        async function bootstrap() {
            try {
                // Mencoba memuat model koding (Qwen/Tiny) yang ada di folder brain
                // Ini akan fetch file asli dari repo Kakak
                generator = await pipeline('text-generation', 'qwen-tiny', {
                    progress_callback: (p) => {
                        fill.style.width = p.progress + '%';
                        info.innerText = `Sinking Brain: ${Math.round(p.progress)}%`;
                    }
                });

                // Jika Berhasil (File di /brain lengkap)
                info.innerText = "Neural Engine Ready";
                led.className = "w-2 h-2 bg-green-500 shadow-[0_0_5px_green] rounded-full";
                input.disabled = false;
                input.placeholder = "Tanya kodingan apa saja...";
                btn.classList.remove('opacity-20', 'pointer-events-none');
                document.getElementById('init-text').innerText = "Model & Brain sudah sinkron secara lokal. Silahkan beri instruksi.";

            } catch (err) {
                console.error("Gagal load brain:", err);
                info.innerText = "Error: File /brain Kosong!";
                led.className = "w-2 h-2 bg-red-500 rounded-full";
            }
        }

        function append(role, content) {
            const div = document.createElement('div');
            if(role === 'user') {
                div.innerHTML = `<div class="user-bubble">${content}</div>`;
            } else {
                div.className = "ai-bubble";
                // Highlighting kodingan jagoan
                let formatted = content.replace(/```([\s\S]*?)```/g, '<pre class="code-block"><code>$1</code></pre>');
                formatted = formatted.replace(/\n/g, '<br>');
                div.innerHTML = `
                    <div class="ai-avatar">AI</div>
                    <div class="text-sm text-gray-700 pt-1 leading-relaxed flex-1">${formatted}</div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function askAI() {
            const query = input.value.trim();
            if(!query) return;

            append('user', query);
            input.value = '';
            
            thinkArea.classList.remove('hidden');
            
            // SEKUENS MIKIR NYATA (Sesuai Perintah Kakak)
            const sequence = ["Membaca...", "Menganalisa...", "Berpikir...", "Membalas..."];
            for(let s of sequence) {
                statusLabel.innerText = s;
                await new Promise(r => setTimeout(r, 800));
            }

            try {
                // INFERENSI ASLI: Mengolah data menggunakan mesin yang sudah disuntikkan
                const result = await generator(query, { 
                    max_new_tokens: 256, 
                    temperature: 0.6,
                    repetition_penalty: 1.1
                });
                
                thinkArea.classList.add('hidden');
                append('ai', result[0].generated_text);
            } catch (e) {
                thinkArea.classList.add('hidden');
                append('ai', "Maaf Kak, engine gagal memproses logic. Pastikan bobot model di folder `/brain` sesuai arsitektur Qwen.");
            }
        }

        btn.onclick = askAI;
        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.click(); } };

        // Start the engine
        bootstrap();
    </script>
</body>
</html>
