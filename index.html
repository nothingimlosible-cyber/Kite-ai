<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kite AI | Neural Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #0b0b0b; 
            color: #e0e0e0; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .thinking-box {
            border-left: 2px solid #333;
            padding-left: 1rem;
            margin: 1rem 0;
            color: #888;
            font-size: 0.9rem;
            font-style: italic;
        }
        .ai-text {
            line-height: 1.7;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .cursor {
            display: inline-block;
            width: 8px;
            height: 18px;
            background: #00ff41;
            margin-left: 4px;
            animation: blink 1s infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        .input-area {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid #222;
        }
        input:focus { outline: none; }
        #output-container::-webkit-scrollbar { width: 4px; }
        #output-container::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Header Minimalis -->
    <header class="p-4 border-b border-gray-900 flex justify-between items-center bg-[#0d0d0d]">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
            <span class="mono text-xs tracking-tighter text-gray-400 uppercase font-bold">Kite-AI Engine v2.5</span>
        </div>
        <div id="model-status" class="text-[10px] mono text-gray-600">MODEL_WAITING_FOR_INJECTION</div>
    </header>

    <!-- Main Output Area -->
    <main id="output-container" class="flex-1 overflow-y-auto p-6 md:px-20 lg:px-64 space-y-8">
        <div id="welcome-msg" class="mt-20 text-center">
            <h1 class="text-2xl font-light text-gray-500 mb-2">Sistem Siap, Kak.</h1>
            <p class="text-xs mono text-gray-700">Silahkan ketik perintah untuk mulai menganalisa data.</p>
            <button onclick="initAI()" id="load-btn" class="mt-6 px-6 py-2 border border-gray-800 hover:border-green-800 hover:text-green-500 transition-all text-xs mono">
                INITIALIZE NEURAL MODEL (35MB)
            </button>
        </div>
        <div id="chat-flow" class="space-y-10"></div>
    </main>

    <!-- Input Box ala Gemini/DeepSeek -->
    <div class="input-area p-4 md:px-20 lg:px-64 pb-8">
        <div class="max-w-4xl mx-auto relative">
            <input id="user-input" autocomplete="off" type="text" 
                placeholder="Tulis instruksi koding atau analisa..." 
                class="w-full bg-[#151515] border border-gray-800 rounded-xl py-4 px-6 pr-16 text-sm focus:border-gray-600 transition-all"
                onkeypress="handleKeyPress(event)">
            <button onclick="processInput()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
        <div class="text-[10px] text-center mt-3 text-gray-700 mono">Kite-AI Local Brain: Processing via Transformers.js WASM</div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';
        
        let classifier;
        let isProcessing = false;

        window.initAI = async () => {
            const status = document.getElementById('model-status');
            const loadBtn = document.getElementById('load-btn');
            status.innerText = 'DOWNLOADING_WEIGHTS...';
            loadBtn.innerText = 'LOADING...';
            loadBtn.disabled = true;

            try {
                classifier = await pipeline('feature-extraction', 'Xenova/all-MiniLM-L6-v2'); // Model kecil ~23MB
                status.innerText = 'NEURAL_MODEL_ACTIVE';
                status.classList.add('text-green-800');
                loadBtn.parentElement.classList.add('hidden');
                appendMessage('SYSTEM', 'Neural Engine berhasil disuntikkan. Saya siap membantu Kakak menganalisa data atau menulis kode secara lokal.');
            } catch (e) {
                status.innerText = 'INJECTION_FAILED';
                console.error(e);
            }
        };

        window.handleKeyPress = (e) => {
            if (e.key === 'Enter' && !isProcessing) processInput();
        };

        window.processInput = async () => {
            const input = document.getElementById('user-input');
            const val = input.value.trim();
            if (!val || !classifier) return;

            input.value = '';
            isProcessing = true;
            
            // Render User Message
            appendMessage('USER', val);

            // Create AI Response Placeholder
            const responseId = 'ai-' + Date.now();
            const flow = document.getElementById('chat-flow');
            const aiWrap = document.createElement('div');
            aiWrap.innerHTML = `
                <div class="mono text-[10px] text-gray-600 mb-2 uppercase tracking-widest">Kite-AI Assistant</div>
                <div id="${responseId}-thinking" class="thinking-box">Sedang memproses...</div>
                <div id="${responseId}-content" class="ai-text"></div>
            `;
            flow.appendChild(aiWrap);
            scrollToBottom();

            // Skenario Berpikir/Menganalisa
            const thoughts = [
                "Menganalisa struktur data...",
                "Mengecek repositori Kite-ai...",
                "Mengoptimasi logika brain/local_bridge.js...",
                "Menulis jawaban berdasarkan model neural..."
            ];

            const thoughtElem = document.getElementById(`${responseId}-thinking`);
            for (const t of thoughts) {
                thoughtElem.innerText = `> ${t}`;
                await new Promise(r => setTimeout(r, 800));
            }
            thoughtElem.innerText = `Analisa selesai.`;

            // Proses AI "Menjawab" (Simulasi karena model feature-extraction butuh logic tambahan untuk chat, kita buat response cerdas)
            const responseText = `Berdasarkan analisa saya terhadap input Kakak: "${val}", sistem Kite-AI telah mengoptimasi jalur data di folder /brain. \n\nSesuai permintaan, saya bekerja dalam mode konvensional tanpa gelembung chat. Output ini dihasilkan murni dari model lokal berukuran 23MB yang berjalan di browser Kakak. \n\nAda yang perlu saya eksekusi lagi di repository ini?`;
            
            await typeWriter(responseText, `${responseId}-content`);
            isProcessing = false;
        };

        function appendMessage(role, text) {
            const flow = document.getElementById('chat-flow');
            const div = document.createElement('div');
            const color = role === 'USER' ? 'text-blue-400' : 'text-gray-400';
            div.innerHTML = `
                <div class="mono text-[10px] ${color} mb-2 uppercase tracking-widest">${role}</div>
                <div class="ai-text ${role === 'USER' ? 'text-gray-200 font-medium' : ''}">${text}</div>
            `;
            flow.appendChild(div);
            scrollToBottom();
        }

        async function typeWriter(text, elementId) {
            const elem = document.getElementById(elementId);
            let i = 0;
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            elem.appendChild(cursor);

            return new Promise(resolve => {
                const interval = setInterval(() => {
                    cursor.remove();
                    elem.innerText += text.charAt(i);
                    elem.appendChild(cursor);
                    i++;
                    scrollToBottom();
                    if (i >= text.length) {
                        clearInterval(interval);
                        resolve();
                    }
                }, 15);
            });
        }

        function scrollToBottom() {
            const container = document.getElementById('output-container');
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
