<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITE AI | Pro Coder v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@300;400;600;800&display=swap');
        
        /* Dasar Body */
        body { 
            background: #0a0c10; 
            color: #c9d1d9; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        /* Container Chat */
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        /* PERBAIKAN TEKS NYAMPING (WRAP) */
        .prose {
            max-width: 100% !important;
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
            white-space: normal !important;
            color: #e6edf3 !important;
        }

        /* PERBAIKAN BLOK KODE */
        .prose pre { 
            background: #161b22 !important; 
            border: 1px solid #444c56; 
            padding: 1rem; 
            border-radius: 10px; 
            overflow-x: auto !important; /* Hanya kode yang boleh scroll nyamping */
            white-space: pre !important; /* Biar format kodingan gak hancur */
            margin: 10px 0;
        }

        .prose code { 
            color: #79c0ff !important; 
            word-break: break-all !important; /* Cegah teks kode panjang ngerusak layout */
        }

        .bubble-bot {
            background: #161b22;
            border: 1px solid #30363d;
        }

        .bubble-user {
            background: linear-gradient(135deg, #1d4ed8, #2563eb);
        }

        .fade-in { animation: fadeInUp 0.4s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-4 border-b border-[#30363d] bg-[#0d1117] flex justify-between items-center z-10 shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 bg-blue-500 rounded-full shadow-[0_0_10px_#3b82f6]"></div>
            <h1 class="font-bold tracking-tighter text-white uppercase text-sm">Kite AI <span class="text-blue-500">PRO_CODER</span></h1>
        </div>
        <div id="status" class="text-[8px] text-emerald-500 font-mono font-bold tracking-widest">NEURAL_ONLINE</div>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-64 space-y-6 chat-container pb-32">
        <div class="flex justify-start fade-in">
            <div class="bubble-bot p-4 rounded-2xl max-w-[90%] md:max-w-[85%] text-sm shadow-md">
                <span class="text-blue-400 font-bold text-[9px] uppercase block mb-1">Kite Engine</span>
                Halo Lan! Sistem sudah di-update. Sekarang teksnya bakal otomatis pindah baris kalau kepanjangan. Aman dari scroll nyamping! 🚀
            </div>
        </div>
    </main>

    <footer class="p-6 fixed bottom-0 w-full md:px-64 bg-gradient-to-t from-[#0a0c10] to-transparent">
        <div class="relative flex items-center max-w-4xl mx-auto">
            <input type="text" id="userInput" placeholder="Tanya koding..." class="w-full bg-[#161b22] border border-[#30363d] p-4 pr-16 rounded-2xl focus:outline-none focus:border-blue-500/50 text-sm transition-all shadow-2xl">
            <button onclick="handleChat()" class="absolute right-4 text-blue-500 p-2 hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');
        const CORES = ['brain/javascript.yml', 'brain/python.yml', 'brain/web_design.yml', 'brain/database.yml'];

        const CHAT_LOGIC = {
            "halo": "Halo juga Lan! Ada yang bisa saya bantu soal koding hari ini?",
            "pagi": "Selamat pagi Lan! Waktunya produktif!",
            "siapa": "Saya Kite AI, asisten koding pribadi kamu.",
            "bisa apa": "Saya bisa bantu cari info soal JavaScript, Python, Web Design, dan Database."
        };

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });

        async function handleChat() {
            const val = input.value.trim(); if(!val) return;
            renderMsg(val, true); input.value = "";
            const loading = renderLoading();
            
            try {
                let jawaban = null;
                const lowVal = val.toLowerCase();

                for (let key in CHAT_LOGIC) {
                    if (lowVal.includes(key)) { jawaban = CHAT_LOGIC[key]; break; }
                }

                if (!jawaban) {
                    const kueri = lowVal.replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(k => k.length > 2);
                    for (const core of CORES) {
                        try {
                            const res = await fetch(core);
                            if (!res.ok) continue;
                            const found = cariSolusi(await res.text(), kueri);
                            if (found) { jawaban = found; break; }
                        } catch (e) { }
                    }
                }

                await new Promise(r => setTimeout(r, 500));
                removeEl(loading);
                renderMsg(jawaban || "Hmm, info itu belum ada di memori saya, Lan. Coba kata kunci lain!", false);
            } catch (err) {
                removeEl(loading);
                renderMsg("⚠️ Gangguan saraf core, coba lagi nanti.", false);
            }
        }

        function cariSolusi(data, kueri) {
            const blocks = data.split(/\n-\s/);
            let best = null, maxScore = -1;
            for (let block of blocks) {
                let score = 0; const lowBlock = block.toLowerCase();
                kueri.forEach(k => { if (lowBlock.includes(k)) score += 10; });
                if (score > 0 && score >= maxScore) {
                    const match = block.match(/s:\s*([\s\S]*?)\s*(?=d:|t:|$)/);
                    if (match && match[1]) {
                        maxScore = score;
                        best = match[1].replace(/^['"]|['"]$/g, '').replace(/\\n/g, '\n').trim();
                    }
                }
            }
            return best;
        }

        function renderMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-4 fade-in`;
            const content = isUser ? text : marked.parse(text);
            div.innerHTML = `<div class="${isUser ? 'bubble-user text-white' : 'bubble-bot text-gray-200'} p-4 px-5 rounded-2xl max-w-[92%] md:max-w-[85%] text-sm shadow-lg">
                ${!isUser ? '<span class="text-blue-400 font-bold text-[9px] uppercase block mb-1">Kite Engine</span>' : ''}
                <div class="prose prose-invert">${content}</div>
            </div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            document.querySelectorAll('pre code').forEach((el) => { hljs.highlightElement(el); });
        }

        function renderLoading() {
            const id = 'load-' + Date.now();
            const div = document.createElement('div');
            div.id = id; div.className = "flex justify-start mb-4 animate-pulse";
            div.innerHTML = `<div class="bg-[#161b22] border border-blue-500/20 text-blue-500 text-[8px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Thinking...</div>`;
            chatBox.appendChild(div);
            return id;
        }

        function removeEl(id) { const e = document.getElementById(id); if(e) e.remove(); }
    </script>
</body>
</html>
