<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITE AI | Pro Coder v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@300;400;600;800&display=swap');
        
        body { 
            background: #0a0c10; 
            color: #c9d1d9; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            margin: 0;
        }

        /* Container Chat Scroll */
        .chat-container::-webkit-scrollbar { width: 4px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        /* TYPOGRAPHY & WRAPPING */
        .prose {
            max-width: 100% !important;
            color: #e6edf3 !important;
            line-height: 1.6;
        }

        .prose p, .prose li {
            word-wrap: break-word !important;
            overflow-wrap: break-word !important;
            white-space: normal !important;
            margin-bottom: 0.8rem;
        }

        /* CODE BLOCK MANAGEMENT */
        .prose pre { 
            background: #0d1117 !important; 
            border: 1px solid #30363d; 
            padding: 1rem; 
            border-radius: 12px; 
            overflow-x: auto !important; /* Hanya kode yang bisa scroll horizontal */
            white-space: pre !important;
            margin: 15px 0;
        }

        .prose code { 
            font-family: 'Fira Code', monospace !important;
            color: #79c0ff !important; 
            font-size: 0.85rem;
        }

        .prose pre code { background: transparent !important; padding: 0 !important; }

        /* BUBBLE STYLE */
        .bubble-bot { background: #161b22; border: 1px solid #30363d; }
        .bubble-user { background: #238636; border: 1px solid #2ea043; }

        .fade-in { animation: fadeInUp 0.3s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- Header -->
    <header class="p-4 border-b border-[#30363d] bg-[#0d1117] flex justify-between items-center z-10 shadow-xl">
        <div class="flex items-center gap-3">
            <div class="w-2.5 h-2.5 bg-blue-500 rounded-full shadow-[0_0_10px_#3b82f6] animate-pulse"></div>
            <h1 class="font-bold tracking-tighter text-white uppercase text-xs md:text-sm">Kite AI <span class="text-blue-500">PRO_CODER_V2</span></h1>
        </div>
        <div id="status" class="text-[9px] text-emerald-500 font-mono font-bold tracking-widest bg-emerald-500/10 px-2 py-1 rounded">SYSTEM_ACTIVE</div>
    </header>

    <!-- Main Chat Area -->
    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-64 space-y-6 chat-container pb-32">
        <div class="flex justify-start fade-in">
            <div class="bubble-bot p-4 px-5 rounded-2xl max-w-[92%] md:max-w-[85%] text-sm shadow-md">
                <span class="text-blue-400 font-bold text-[9px] uppercase tracking-widest block mb-1">Kite Engine</span>
                <div class="prose prose-invert">Halo Lan! Sistem sudah online. Saya sudah sinkron dengan folder `brain`. Silakan tanya soal koding! 🚀</div>
            </div>
        </div>
    </main>

    <!-- Footer Input -->
    <footer class="p-6 fixed bottom-0 w-full md:px-64 bg-gradient-to-t from-[#0a0c10] via-[#0a0c10] to-transparent">
        <div class="relative flex items-center max-w-4xl mx-auto">
            <input type="text" id="userInput" autocomplete="off" placeholder="Tanya koding (React, Node, Python...)" 
                class="w-full bg-[#161b22] border border-[#30363d] p-4 pr-16 rounded-2xl focus:outline-none focus:border-blue-500/50 text-sm transition-all shadow-2xl text-white">
            <button onclick="handleChat()" class="absolute right-4 text-blue-500 p-2 hover:scale-110 transition-transform">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6"><path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" /></svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        // DAFTAR CORE DATA (Sesuaikan dengan nama file di folder brain kamu)
        const CORES = [
            'brain/frontend.yml', 
            'brain/backend.yml', 
            'brain/mobile_dev.yml', 
            'brain/data_science.yml', 
            'brain/devops_security.yml',
            'brain/personality.yml'
        ];

        const CHAT_LOGIC = {
            "halo": "Halo juga Lan! Siap ngoding apa kita hari ini?",
            "pagi": "Pagi Lan! Semangat bangun sistemnya!",
            "siapa": "Saya Kite AI PRO_CODER, asisten yang belajar otomatis tiap 4 jam.",
            "bisa apa": "Saya bisa bantu jelaskan teknologi dari frontend, backend, sampai AI dan DevOps."
        };

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });

        async function handleChat() {
            const val = input.value.trim(); if(!val) return;
            renderMsg(val, true); input.value = "";
            const loading = renderLoading();
            
            try {
                let jawaban = null;
                const lowVal = val.toLowerCase();

                // 1. Cek Pesan Dasar
                for (let key in CHAT_LOGIC) {
                    if (lowVal.includes(key)) { jawaban = CHAT_LOGIC[key]; break; }
                }

                // 2. Jika Tidak Ada, Cari di Folder Brain
                if (!jawaban) {
                    const kueri = lowVal.replace(/[^a-z0-9\s]/g,' ').split(/\s+/).filter(k => k.length > 2);
                    for (const core of CORES) {
                        try {
                            const res = await fetch(core);
                            if (!res.ok) continue;
                            const textData = await res.text();
                            const found = cariSolusi(textData, kueri);
                            if (found) { jawaban = found; break; }
                        } catch (e) { console.log("Core skip:", core); }
                    }
                }

                await new Promise(r => setTimeout(r, 600)); // Simulasi mikir
                removeEl(loading);
                renderMsg(jawaban || "Maaf Lan, info itu belum masuk ke memori `brain` saya. Coba tanya topik lain seperti 'React', 'Docker', atau 'Rust'!", false);
            } catch (err) {
                removeEl(loading);
                renderMsg("⚠️ Terjadi error saat mengakses core data.", false);
            }
        }

        function cariSolusi(data, kueri) {
            // Split data YAML per block (-)
            const blocks = data.split(/\n-\s/);
            let best = null, maxScore = -1;

            for (let block of blocks) {
                let score = 0; 
                const lowBlock = block.toLowerCase();
                
                kueri.forEach(k => { 
                    if (lowBlock.includes(k)) score += 10; 
                });

                if (score > 0 && score >= maxScore) {
                    // Ambil konten di dalam field s: (summary)
                    const match = block.match(/s:\s*([\s\S]*?)\s*(?=d:|t:|$)/);
                    if (match && match[1]) {
                        maxScore = score;
                        // Bersihkan quote dan handle newlines
                        best = match[1].replace(/^['"]|['"]$/g, '')
                                     .replace(/\\n/g, '\n')
                                     .replace(/###/g, '\n###') // Pastikan heading rapi
                                     .trim();
                    }
                }
            }
            return best;
        }

        function renderMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-4 fade-in`;
            
            // Render Markdown kalau dari Bot
            const content = isUser ? text : marked.parse(text);

            div.innerHTML = `
                <div class="${isUser ? 'bubble-user text-white' : 'bubble-bot text-gray-200'} p-4 px-5 rounded-2xl max-w-[92%] md:max-w-[85%] text-sm shadow-lg">
                    ${!isUser ? '<span class="text-blue-400 font-bold text-[10px] uppercase tracking-widest block mb-2 opacity-70">Kite Engine</span>' : ''}
                    <div class="prose prose-invert">${content}</div>
                </div>`;

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Highlight kodingan jika ada
            if (!isUser) {
                document.querySelectorAll('pre code').forEach((el) => {
                    hljs.highlightElement(el);
                });
            }
        }

        function renderLoading() {
            const id = 'load-' + Date.now();
            const div = document.createElement('div');
            div.id = id; div.className = "flex justify-start mb-4 animate-pulse";
            div.innerHTML = `<div class="bg-[#161b22] border border-blue-500/20 text-blue-500 text-[8px] px-3 py-1 rounded-full font-bold uppercase tracking-widest">Neural Thinking...</div>`;
            chatBox.appendChild(div);
            return id;
        }

        function removeEl(id) { const e = document.getElementById(id); if(e) e.remove(); }
    </script>
</body>
</html>
