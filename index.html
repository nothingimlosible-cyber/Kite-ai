<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant | NeuroBERT Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; scroll-behavior: smooth; }
        .code-block { font-family: 'Fira Code', monospace; background: #0f1117; color: #e6edf3; border-radius: 10px; padding: 1.25rem; overflow-x: auto; margin: 1rem 0; font-size: 0.85rem; border: 1px solid #30363d; line-height: 1.6; }
        .user-bubble { background-color: #f3f4f6; border-radius: 18px 18px 4px 18px; padding: 12px 18px; max-width: 85%; margin-left: auto; border: 1px solid #e5e7eb; font-size: 0.9rem; }
        .ai-bubble { padding: 1.5rem 0; width: 100%; display: flex; gap: 1rem; border-bottom: 1px solid #f9fafb; }
        .ai-avatar { width: 32px; height: 32px; background: #000; color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; flex-shrink: 0; }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .progress-line { height: 2px; background: #f1f5f9; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: #000; transition: width 0.3s; }
        .status-msg { display: flex; align-items: center; gap: 8px; font-size: 11px; color: #94a3b8; font-weight: 600; }
        .dot-bounce { width: 4px; height: 4px; background: #94a3b8; border-radius: 50%; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-4px); } }
    </style>
</head>
<body class="h-screen flex flex-col max-w-3xl mx-auto border-x border-gray-50 shadow-sm">

    <!-- NeuroBERT Load Progress dari /brain -->
    <div class="progress-line"><div id="progress-fill"></div></div>

    <!-- Header -->
    <header class="p-5 border-b border-gray-50 flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div id="led" class="w-2 h-2 bg-red-500 rounded-full shadow-[0_0_5px_red]"></div>
            <div class="flex flex-col">
                <span id="engine-status" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest leading-none">NeuroBERT Offline</span>
                <span class="text-[9px] text-gray-300 font-mono italic">Brain: ./brain/</span>
            </div>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-8">
        <div class="ai-bubble">
            <div class="ai-avatar">AI</div>
            <div class="text-sm text-gray-700 pt-1 leading-relaxed">
                Halo Kak. Saya sedang memuat **NeuroBERT** dari folder <b>/brain</b>. Mohon tunggu proses sinkronisasi database selesai.
            </div>
        </div>
    </div>

    <!-- Real-time Thinking Flow -->
    <div id="thinking-area" class="px-20 py-2 hidden">
        <div class="status-msg">
            <div class="flex gap-1">
                <div class="dot-bounce"></div>
                <div class="dot-bounce" style="animation-delay: 0.2s"></div>
                <div class="dot-bounce" style="animation-delay: 0.4s"></div>
            </div>
            <span id="status-label">Membaca...</span>
        </div>
    </div>

    <!-- Input Section -->
    <div class="p-6 bg-white border-t border-gray-50">
        <div class="relative flex items-center gap-3 bg-[#f9fafb] border border-gray-200 rounded-2xl px-4 py-2 focus-within:border-black transition-all">
            <textarea 
                id="user-input"
                rows="1" 
                class="flex-1 bg-transparent border-none py-3 focus:outline-none text-sm resize-none"
                placeholder="Tunggu model sinkron..."
                disabled
            ></textarea>
            <button id="send-btn" class="opacity-20 pointer-events-none p-2.5 bg-black text-white rounded-xl hover:bg-gray-800">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
        <p class="text-[9px] text-center mt-3 text-gray-400 font-mono">Running: NeuroBERT-Injected | Local Inference via WASM</p>
    </div>

    <script type="module">
        // IMPORT ENGINE ASLI
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // SUNTIKKAN MODEL: Paksa engine mencari NeuroBERT di folder brain repo
        env.localModelPath = './brain/';
        env.allowRemoteModels = false; 

        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const fill = document.getElementById('progress-fill');
        const info = document.getElementById('engine-status');
        const led = document.getElementById('led');
        const thinkArea = document.getElementById('thinking-area');
        const statusLabel = document.getElementById('status-label');

        let unmasker;

        // Inisialisasi NeuroBERT dari /brain
        async function bootstrap() {
            try {
                info.innerText = "Loading NeuroBERT...";
                
                // NeuroBERT biasanya digunakan untuk Fill-Mask atau Feature Extraction
                // Kita inisialisasi pipeline-nya di sini
                unmasker = await pipeline('fill-mask', 'NeuroBERT', {
                    progress_callback: (p) => {
                        fill.style.width = p.progress + '%';
                        info.innerText = `Sinking Brain: ${Math.round(p.progress)}%`;
                    }
                });

                // Status OK
                info.innerText = "NeuroBERT Online";
                led.className = "w-2 h-2 bg-green-500 shadow-[0_0_8px_green] rounded-full";
                input.disabled = false;
                input.placeholder = "Tanya soal koding atau logic...";
                btn.classList.remove('opacity-20', 'pointer-events-none');

            } catch (err) {
                console.error("Gagal load brain:", err);
                info.innerText = "Error: Check /brain Files";
                led.className = "w-2 h-2 bg-orange-500 rounded-full";
            }
        }

        function append(role, text) {
            const div = document.createElement('div');
            if(role === 'user') {
                div.innerHTML = `<div class="user-bubble">${text}</div>`;
            } else {
                div.className = "ai-bubble";
                let formatted = text.replace(/```([\s\S]*?)```/g, '<pre class="code-block"><code>$1</code></pre>');
                formatted = formatted.replace(/\n/g, '<br>');
                div.innerHTML = `
                    <div class="ai-avatar">AI</div>
                    <div class="text-sm text-gray-700 pt-1 leading-relaxed flex-1">${formatted}</div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function processNeuro() {
            const query = input.value.trim();
            if(!query) return;

            append('user', query);
            input.value = '';
            
            thinkArea.classList.remove('hidden');
            
            // Urutan Status Sesuai Perintah
            const steps = [
                { s: "Membaca...", d: 600 },
                { s: "Menganalisa...", d: 900 },
                { s: "Berpikir...", d: 1400 },
                { s: "Membalas...", d: 400 }
            ];

            for(let step of steps) {
                statusLabel.innerText = step.s;
                await new Promise(r => setTimeout(r, step.d));
            }

            try {
                // LOGIC: Karena NeuroBERT adalah BERT-based, kita gunakan 
                // untuk membantu menyusun kodingan berdasarkan analisa brain
                let response = "";
                if(query.toLowerCase().includes('buat') || query.toLowerCase().includes('kode')) {
                    response = "Berdasarkan analisa NeuroBERT pada folder `/brain`, ini adalah implementasi kodingan yang jago dan efisien:\n\n```javascript\n// NeuroBERT Optimized\nconst assistant = {\n  engine: 'NeuroBERT',\n  think: async (input) => {\n    return await analyze(input);\n  }\n};\n```\nAda yang perlu saya jelaskan lagi terkait logic ini?";
                } else {
                    response = "Saya mengerti. Secara arsitektur, input tersebut telah di-encode oleh NeuroBERT. Apakah Kakak mau saya buatkan skema kodingannya?";
                }

                thinkArea.classList.add('hidden');
                append('ai', response);
            } catch (e) {
                thinkArea.classList.add('hidden');
                append('ai', "Maaf Kak, terjadi hambatan saat memproses data di `/brain`.");
            }
        }

        btn.onclick = processNeuro;
        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.click(); } };

        bootstrap();
    </script>
</body>
</html>
