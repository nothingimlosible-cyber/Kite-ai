<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .code-block { font-family: 'Fira Code', monospace; background: #f4f4f4; border-radius: 8px; padding: 1rem; overflow-x: auto; margin: 10px 0; font-size: 0.9rem; border: 1px solid #ddd; }
        .status-text { font-size: 0.8rem; color: #666; font-style: italic; display: none; }
        .chat-bubble { max-width: 85%; line-height: 1.6; }
        .user-msg { background-color: #f0f0f0; border-radius: 18px 18px 4px 18px; }
        .ai-msg { background-color: transparent; }
        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 10px; }
        .dot-flashing { position: relative; width: 6px; height: 6px; border-radius: 5px; background-color: #999; color: #999; animation: dotFlashing 1s infinite linear alternate; animation-delay: .5s; }
        .dot-flashing::before, .dot-flashing::after { content: ''; display: inline-block; position: absolute; top: 0; width: 6px; height: 6px; border-radius: 5px; background-color: #999; color: #999; animation: dotFlashing 1s infinite alternate; }
        .dot-flashing::before { left: -12px; animation-delay: 0s; }
        .dot-flashing::after { left: 12px; animation-delay: 1s; }
        @keyframes dotFlashing { 0% { background-color: #999; } 50%, 100% { background-color: #ebebeb; } }
    </style>
</head>
<body class="h-screen flex flex-col max-w-4xl mx-auto border-x border-gray-100">

    <!-- Header -->
    <header class="p-6 border-b border-gray-50 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-10">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            <h1 class="text-sm font-semibold text-gray-500 tracking-tight">KITE ENGINE v2</h1>
        </div>
    </header>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-8">
        <!-- AI Initial Greeting -->
        <div class="flex gap-4 ai-msg">
            <div class="w-8 h-8 rounded-full bg-black text-white flex items-center justify-center text-[10px] shrink-0">AI</div>
            <div class="chat-bubble text-sm">Ada yang bisa saya bantu dengan kodingan Kakak hari ini?</div>
        </div>
    </div>

    <!-- Status Indicator -->
    <div id="status-bar" class="px-20 py-2 hidden">
        <div class="flex items-center gap-4">
            <div class="dot-flashing"></div>
            <span id="status-label" class="text-xs text-gray-400 font-medium ml-4">Membaca...</span>
        </div>
    </div>

    <!-- Input Area -->
    <div class="p-6 bg-white">
        <div class="relative flex items-end gap-2 bg-[#f4f4f4] rounded-2xl p-2 transition-all focus-within:ring-2 ring-gray-200">
            <textarea 
                id="user-input"
                rows="1" 
                class="flex-1 bg-transparent border-none px-4 py-3 focus:outline-none text-sm resize-none"
                placeholder="Tanya soal koding..."
                oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"
            ></textarea>
            <button id="send-btn" class="p-3 bg-black text-white rounded-xl hover:opacity-80 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
        <p class="text-[10px] text-center mt-4 text-gray-400">Neural Model 23MB Active</p>
    </div>

    <script type="module">
        // Import model logic secara diam-diam dari folder /brain
        // Diasumsikan brain/brain.js adalah entry point modelnya
        // import { processQuery } from './brain/brain.js'; 

        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const statusBar = document.getElementById('status-bar');
        const statusLabel = document.getElementById('status-label');

        function appendMsg(role, text) {
            const isAI = role === 'ai';
            const div = document.createElement('div');
            div.className = `flex gap-4 ${isAI ? 'ai-msg' : 'flex-row-reverse user-msg-container'}`;
            
            // Basic code highlighter logic
            let formattedText = text.replace(/```([\s\S]*?)```/g, '<div class="code-block">$1</div>');
            formattedText = formattedText.replace(/\n/g, '<br>');

            div.innerHTML = `
                <div class="w-8 h-8 rounded-full ${isAI ? 'bg-black text-white' : 'bg-gray-200 text-gray-600'} flex items-center justify-center text-[10px] shrink-0">
                    ${isAI ? 'AI' : 'ME'}
                </div>
                <div class="chat-bubble ${!isAI ? 'user-msg p-4 bg-gray-100' : ''} text-sm">
                    ${formattedText}
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function updateStatus(label, delay) {
            statusLabel.innerText = label;
            return new Promise(res => setTimeout(res, delay));
        }

        async function handleAction() {
            const query = input.value.trim();
            if(!query) return;

            appendMsg('user', query);
            input.value = '';
            input.style.height = 'auto';

            // Start Status Sequence
            statusBar.classList.remove('hidden');
            await updateStatus('Membaca...', 600);
            await updateStatus('Menganalisa...', 800);
            await updateStatus('Berpikir...', 1200);
            await updateStatus('Membalas...', 400);
            statusBar.classList.add('hidden');

            // Model Logic (Simulasi panggil dari /brain)
            // Di sini nanti panggil fungsi asli dari model 23mb Kakak
            let response = "";
            if(query.toLowerCase().includes('buatkan') || query.toLowerCase().includes('kode')) {
                response = "Tentu, ini contoh kodingan yang Kakak minta:\n\n```javascript\nfunction solveProblem() {\n  const data = [1, 2, 3];\n  return data.map(x => x * 2);\n}\nconsole.log(solveProblem());\n```\nAda lagi yang perlu diperbaiki?";
            } else {
                response = "Saya mengerti. Secara teknis, hal itu bisa diimplementasikan dengan optimasi pada layer logic. Mau saya buatkan rangkuman kodingannya?";
            }

            appendMsg('ai', response);
        }

        btn.onclick = handleAction;
        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAction(); } };
    </script>
</body>
</html>
