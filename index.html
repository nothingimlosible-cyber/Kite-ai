<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KITE AI | Coder Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
        pre code { border-radius: 8px; font-size: 0.85rem !important; }
    </style>
</head>
<body class="h-screen flex flex-col">
    <header class="p-4 border-b border-[#30363d] bg-[#161b22] flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-3 h-3 bg-blue-500 rounded-full animate-pulse"></div>
            <h1 class="font-bold tracking-tight text-white">KITE AI <span class="text-blue-500 text-xs">CODER v1.0</span></h1>
        </div>
        <div class="text-[10px] font-mono text-gray-500">SYSTEM: ONLINE</div>
    </header>

    <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:px-40 space-y-6 chat-container">
        <div class="flex justify-start">
            <div class="bg-[#21262d] border border-[#30363d] p-4 rounded-2xl max-w-[90%] text-sm leading-relaxed">
                Halo Lan! Saya sudah di-reset menjadi <b>Coder Mode</b>. 
                Tanya saya soal fungsi JavaScript, Python, atau CSS. Yuk mulai!
            </div>
        </div>
    </main>

    <footer class="p-4 bg-[#0d1117] border-t border-[#30363d]">
        <div class="max-w-4xl mx-auto relative flex items-center">
            <input type="text" id="userInput" placeholder="Ketik perintah koding... (misal: 'cara fetch api')" 
                   class="w-full bg-[#161b22] border border-[#30363d] p-4 pr-16 rounded-xl focus:outline-none focus:border-blue-500 text-sm transition-all">
            <button onclick="handleChat()" class="absolute right-3 p-2 text-blue-500 hover:text-blue-400">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 12L3.269 3.126A59.768 59.768 0 0121.485 12 59.77 59.77 0 013.27 20.876L5.999 12zm0 0h7.5" />
                </svg>
            </button>
        </div>
    </footer>

    <script>
        const chatBox = document.getElementById('chatBox');
        const input = document.getElementById('userInput');

        input.addEventListener("keypress", (e) => { if (e.key === "Enter") handleChat(); });

        async function handleChat() {
            const val = input.value.trim();
            if(!val) return;

            // Tampilkan pesan user
            renderMsg(val, true);
            input.value = "";

            // Simulasi Berpikir
            const loading = renderLoading();
            
            try {
                // SEMENTARA: Kita pakai logika simulasi dulu sebelum kita hubungkan ke YAML
                await new Promise(r => setTimeout(r, 800));
                removeEl(loading);
                
                const response = `Tentu, Lan! Berikut adalah contoh kode untuk **${val}**:
\`\`\`javascript
function solusi() {
  console.log("Kite AI sedang disiapkan untuk data ini.");
}
\`\`\`
Gunakan perintah di atas di dalam file .js kamu ya!`;

                renderMsg(response, false);
            } catch (err) {
                removeEl(loading);
                renderMsg("Error pada saraf koding: " + err.message, false);
            }
        }

        function renderMsg(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} animate-fadeIn`;
            
            // Gunakan Marked untuk render Markdown/Code
            const content = isUser ? text : marked.parse(text);
            
            div.innerHTML = `
                <div class="${isUser ? 'bg-blue-600 text-white' : 'bg-[#21262d] border border-[#30363d] text-gray-200'} p-4 rounded-2xl max-w-[90%] text-sm shadow-xl">
                    ${content}
                </div>`;
            
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
            
            // Highlight kode otomatis
            document.querySelectorAll('pre code').forEach((el) => {
                hljs.highlightElement(el);
            });
        }

        function renderLoading() {
            const id = 'load-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = "flex justify-start animate-pulse";
            div.innerHTML = `<div class="text-[10px] font-mono text-blue-500 uppercase tracking-widest">Memindai repositori...</div>`;
            chatBox.appendChild(div);
            return id;
        }

        function removeEl(id) { const e = document.getElementById(id); if(e) e.remove(); }
    </script>
</body>
</html>
