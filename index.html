<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KITE · Neural Workspace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Premium scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1f;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a40;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4a4a50;
        }
        
        /* Glassmorphism */
        .glass {
            background: rgba(16, 16, 20, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(64, 64, 72, 0.4);
        }
        
        /* Typing animation premium */
        .cursor-blink::after {
            content: '▊';
            animation: blink 1s step-end infinite;
            margin-left: 2px;
            color: #3b82f6;
            font-weight: 400;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Message animations */
        .message-in {
            animation: messageSlide 0.3s cubic-bezier(0.16, 1, 0.2, 1);
        }
        
        @keyframes messageSlide {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Thinking steps */
        .thinking-phase {
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            color: #6e6e7a;
            padding: 6px 0 6px 14px;
            border-left: 2px solid #3b82f6;
            margin: 8px 0;
            transition: all 0.2s ease;
        }
        
        /* Code blocks */
        pre {
            background: #0d0d12 !important;
            border-radius: 12px !important;
            padding: 1rem !important;
            border: 1px solid #2a2a30 !important;
            overflow-x: auto !important;
        }
        
        code {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 0.8rem !important;
        }
        
        /* Input focus */
        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="glass fixed top-0 left-0 right-0 z-50 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-blue-500 rounded-full shadow-[0_0_8px_#3b82f6]"></div>
            <span class="text-white font-semibold text-sm tracking-tight">KITE</span>
            <span class="text-blue-400 font-mono text-[10px] font-medium bg-blue-500/10 px-2 py-0.5 rounded">v3.0</span>
        </div>
        <div class="flex items-center gap-3">
            <div id="brainStats" class="text-[10px] font-mono text-emerald-400/80">⟳ INITIALIZING</div>
            <div class="w-px h-4 bg-white/10"></div>
            <div class="text-[10px] text-white/40 font-mono">neural active</div>
        </div>
    </header>

    <!-- Chat Container -->
    <main id="chatContainer" class="h-screen overflow-y-auto pt-20 pb-32 px-4 md:px-32 lg:px-64">
        <div class="max-w-4xl mx-auto space-y-5">
            <!-- Welcome Message -->
            <div class="message-in">
                <div class="bg-[#121217] rounded-2xl p-5 border border-white/5 max-w-[85%]">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-blue-400 text-[10px] font-bold uppercase tracking-wide">✧ KITE NEURAL ENGINE</span>
                    </div>
                    <p class="text-gray-300 text-[0.9rem] leading-relaxed">
                        Neural workspace aktif. Memindai direktori <code class="text-blue-300 text-xs bg-blue-500/10 px-1.5 py-0.5 rounded">/brain</code> via GitHub API.<br>
                        Tersedia <span id="fileCount" class="text-blue-400 font-semibold">--</span> modul pengetahuan. Ajukan pertanyaan teknis Anda.
                    </p>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-[#0a0a0f] via-[#0a0a0f] to-transparent">
        <div class="max-w-3xl mx-auto">
            <div class="relative">
                <textarea id="userInput" rows="1" placeholder="Ajukan pertanyaan..." 
                    class="w-full bg-[#121217] border border-white/10 rounded-xl p-4 pr-14 text-white text-sm resize-none focus:outline-none focus:border-blue-500/50 transition-all placeholder:text-white/20 input-focus"></textarea>
                <button id="sendBtn" class="absolute right-3 bottom-3 text-blue-400 hover:text-blue-300 transition-all hover:scale-105 active:scale-95">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
                    </svg>
                </button>
            </div>
            <div class="text-center mt-2">
                <span class="text-[9px] text-white/20 font-mono">KITE neural engine · realtime brain scan</span>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi
        const REPO_OWNER = "nothingimlosible-cyber";
        const REPO_NAME = "Kite-ai";
        const BRANCH = "main";
        
        let brainModules = new Map();
        let isLoading = false;
        
        // Update statistik
        function updateStats() {
            const statsEl = document.getElementById('brainStats');
            const fileCountEl = document.getElementById('fileCount');
            if (statsEl) statsEl.innerHTML = `🧠 ${brainModules.size} MODULES`;
            if (fileCountEl) fileCountEl.innerText = brainModules.size;
        }
        
        // Scan folder brain via GitHub API
        async function scanBrainDirectory() {
            const statsEl = document.getElementById('brainStats');
            statsEl.innerHTML = `⟳ SCANNING REPO`;
            
            try {
                const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/brain?ref=${BRANCH}`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) throw new Error(`GitHub API error: ${response.status}`);
                
                const files = await response.json();
                const yamlFiles = files.filter(f => 
                    f.name.endsWith('.yml') && 
                    !f.name.includes('manifest') &&
                    f.type === 'file'
                );
                
                statsEl.innerHTML = `📂 ${yamlFiles.length} FOUND`;
                
                let loaded = 0;
                for (const file of yamlFiles) {
                    try {
                        const rawUrl = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/brain/${file.name}`;
                        const yamlResponse = await fetch(`${rawUrl}?t=${Date.now()}`);
                        
                        if (yamlResponse.ok) {
                            const yamlText = await yamlResponse.text();
                            const parsed = jsyaml.load(yamlText);
                            
                            if (parsed && typeof parsed === 'object') {
                                brainModules.set(file.name.replace('.yml', ''), {
                                    content: parsed,
                                    raw: yamlText
                                });
                                loaded++;
                                statsEl.innerHTML = `⚙️ LOADING ${loaded}/${yamlFiles.length}`;
                            }
                        }
                    } catch (err) {
                        console.warn(`Failed to load ${file.name}:`, err);
                    }
                    await new Promise(r => setTimeout(r, 15));
                }
                
                updateStats();
                statsEl.innerHTML = `🧠 ${brainModules.size} ACTIVE`;
                
            } catch (err) {
                console.error('Scan failed:', err);
                statsEl.innerHTML = `⚠️ SCAN FAILED`;
            }
        }
        
        // Cari jawaban paling relevan
        function searchNeuralNetwork(query) {
            const lowerQuery = query.toLowerCase();
            let bestMatch = {
                score: 0,
                answer: null,
                module: null,
                confidence: 0
            };
            
            for (const [moduleName, moduleData] of brainModules.entries()) {
                const content = moduleData.content;
                let score = 0;
                let answerText = null;
                
                // Prioritaskan field yang mengandung solusi
                const solutionFields = ['s', 'answer', 'solution', 'code', 'explanation', 'description'];
                
                for (const field of solutionFields) {
                    if (content[field] && typeof content[field] === 'string') {
                        const fieldLower = content[field].toLowerCase();
                        if (fieldLower.includes(lowerQuery)) {
                            const fieldScore = field === 's' ? 60 : (field === 'answer' ? 50 : 40);
                            score += fieldScore;
                            if (!answerText) answerText = content[field];
                        }
                    }
                }
                
                // Cek juga keseluruhan konten
                const fullText = JSON.stringify(content).toLowerCase();
                if (fullText.includes(lowerQuery)) score += 10;
                
                if (score > bestMatch.score && answerText) {
                    bestMatch = {
                        score,
                        answer: answerText,
                        module: moduleName,
                        confidence: Math.min(96, Math.floor(score / 1.5))
                    };
                }
            }
            
            return bestMatch;
        }
        
        // Render pesan
        const chatContainer = document.getElementById('chatContainer');
        const chatArea = chatContainer.querySelector('.max-w-4xl');
        
        function appendMessage(content, isUser = false, source = null, confidence = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message-in';
            
            let html = '';
            if (isUser) {
                html = `
                    <div class="flex justify-end">
                        <div class="bg-[#1f6feb] rounded-2xl p-4 max-w-[85%]">
                            <p class="text-white text-sm leading-relaxed">${escapeHtml(content)}</p>
                        </div>
                    </div>
                `;
            } else {
                const parsedContent = marked.parse(content);
                html = `
                    <div class="bg-[#121217] rounded-2xl p-5 border border-white/5 max-w-[85%]">
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-blue-400 text-[10px] font-bold uppercase tracking-wide">✧ KITE NEURAL</span>
                            ${source ? `<span class="text-[9px] font-mono text-white/20">from ${source}</span>` : ''}
                            ${confidence ? `<span class="text-[9px] font-mono text-emerald-500/60 ml-auto">${confidence}% confidence</span>` : ''}
                        </div>
                        <div class="prose prose-invert prose-sm max-w-none text-gray-300 text-[0.9rem] leading-relaxed">
                            ${parsedContent}
                        </div>
                    </div>
                `;
            }
            
            messageDiv.innerHTML = html;
            chatArea.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            // Highlight code blocks
            if (!isUser) {
                messageDiv.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Simulasi proses neural thinking
        async function thinkingProcess(query, onPhase) {
            const phases = [
                "🔍 Scanning neural pathways...",
                `📖 Accessing ${brainModules.size} knowledge modules...`,
                "⚙️ Correlating semantic patterns...",
                `🎯 Targeting query: "${query.slice(0, 50)}${query.length > 50 ? '...' : ''}"`,
                "🧠 Retrieving optimal solution..."
            ];
            
            for (let i = 0; i < phases.length; i++) {
                onPhase(phases[i]);
                await new Promise(r => setTimeout(r, 400 + Math.random() * 200));
            }
        }
        
        // Handle chat
        async function handleChat() {
            if (isLoading) return;
            
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if (!query) return;
            
            isLoading = true;
            appendMessage(query, true);
            input.value = '';
            input.style.height = 'auto';
            
            // Thinking indicator
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'message-in';
            thinkingDiv.innerHTML = `
                <div class="bg-[#121217] rounded-2xl p-4 border border-white/5 max-w-[85%]">
                    <div class="flex items-center gap-2 mb-2">
                        <div class="w-1.5 h-1.5 bg-blue-500 rounded-full animate-pulse"></div>
                        <span class="text-blue-400 text-[9px] font-bold uppercase tracking-wide">✧ THINKING</span>
                    </div>
                    <div id="thinkingPhases" class="space-y-1"></div>
                </div>
            `;
            chatArea.appendChild(thinkingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            
            const phasesContainer = thinkingDiv.querySelector('#thinkingPhases');
            const addPhase = (text) => {
                const phaseDiv = document.createElement('div');
                phaseDiv.className = 'thinking-phase text-[11px]';
                phaseDiv.textContent = text;
                phasesContainer.appendChild(phaseDiv);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            };
            
            await thinkingProcess(query, addPhase);
            thinkingDiv.remove();
            
            // Cari jawaban
            const result = searchNeuralNetwork(query);
            
            if (result.answer && result.score > 15) {
                appendMessage(result.answer, false, result.module, result.confidence);
            } else {
                appendMessage(
                    `Tidak ditemukan solusi relevan di ${brainModules.size} modul pengetahuan yang tersedia.\n\n**Saran:**\n- Perjelas konteks pertanyaan Anda\n- Tambahkan file YAML baru ke direkt \`/brain\`\n- Atau coba formulasi pertanyaan berbeda`,
                    false,
                    null,
                    null
                );
            }
            
            isLoading = false;
        }
        
        // Event listeners
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleChat();
            }
        });
        
        sendBtn.addEventListener('click', handleChat);
        
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(120, this.scrollHeight) + 'px';
        });
        
        // Inisialisasi
        scanBrainDirectory();
    </script>
</body>
</html>
