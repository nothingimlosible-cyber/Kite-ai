<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kite AI | Real Neural Injected</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; color: #000; }
        .code-block { font-family: 'Fira Code', monospace; background: #000; color: #fff; border-radius: 8px; padding: 1.2rem; overflow-x: auto; margin: 1rem 0; font-size: 0.85rem; border: 1px solid #333; }
        .user-bubble { background-color: #f0f0f0; border-radius: 15px 15px 2px 15px; padding: 10px 18px; max-width: 85%; margin-left: auto; font-size: 0.9rem; }
        .ai-bubble { padding: 15px 0; width: 100%; border-bottom: 1px solid #f0f0f0; }
        #chat-container::-webkit-scrollbar { width: 3px; }
        #chat-container::-webkit-scrollbar-thumb { background: #000; }
        .status-indicator { font-size: 11px; color: #888; font-weight: 600; display: flex; align-items: center; gap: 6px; }
        .dot { width: 4px; height: 4px; background: #000; border-radius: 50%; animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; } }
        #progress-container { height: 2px; background: #eee; width: 100%; position: fixed; top: 0; left: 0; z-index: 100; }
        #progress-fill { height: 100%; width: 0%; background: #000; transition: width 0.3s; }
    </style>
</head>
<body class="h-screen flex flex-col max-w-3xl mx-auto border-x border-gray-100">

    <!-- Brain Sync Progress -->
    <div id="progress-container"><div id="progress-fill"></div></div>

    <!-- Header -->
    <header class="p-6 border-b border-gray-50 flex justify-between items-center bg-white/90 backdrop-blur-md sticky top-0 z-50">
        <div class="flex flex-col">
            <span id="engine-status" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Sinking Neural Brain...</span>
            <span class="text-[9px] text-gray-300 font-mono italic">Source: ./brain/</span>
        </div>
        <div id="led" class="w-2 h-2 bg-gray-200 rounded-full"></div>
    </header>

    <!-- Chat Area -->
    <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-8">
        <div class="ai-bubble flex gap-4">
            <div class="w-8 h-8 rounded bg-black text-white flex items-center justify-center text-[10px] font-bold shrink-0">AI</div>
            <div class="text-sm text-gray-800 pt-1 leading-relaxed" id="welcome-text">
                Menghubungkan model ke database <b>/brain</b>... Tunggu sinkronisasi selesai.
            </div>
        </div>
    </div>

    <!-- AI Thinking Status -->
    <div id="thinking-status" class="px-20 py-2 hidden">
        <div class="status-indicator">
            <div class="dot"></div>
            <span id="status-label">Membaca...</span>
        </div>
    </div>

    <!-- Input Bar -->
    <div class="p-6 bg-white border-t border-gray-50">
        <div class="relative flex items-center gap-3 bg-[#fafafa] border border-gray-200 rounded-xl px-4 py-2 transition-all focus-within:border-black">
            <textarea 
                id="user-input"
                rows="1" 
                class="flex-1 bg-transparent border-none py-2 focus:outline-none text-sm resize-none"
                placeholder="Loading Brain..."
                disabled
            ></textarea>
            <button id="send-btn" class="opacity-20 pointer-events-none p-2 bg-black text-white rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
            </button>
        </div>
    </div>

    <script type="module">
        // SUNTIKAN ENGINE MODEL ASLI
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.1';

        // Konfigurasi Engine: Point ke folder /brain di repo
        env.localModelPath = './brain/';
        env.allowRemoteModels = false; // Harus ambil dari folder brain lokal

        const container = document.getElementById('chat-container');
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const fill = document.getElementById('progress-fill');
        const engineInfo = document.getElementById('engine-status');
        const led = document.getElementById('led');
        const thinkArea = document.getElementById('thinking-status');
        const statusLabel = document.getElementById('status-label');

        let generator;

        // Proses Injeksi & Sinkronisasi
        async function initNeural() {
            try {
                // Inisialisasi arsitektur Qwen/Nano menggunakan bobot dari /brain
                generator = await pipeline('text-generation', 'qwen-tiny', {
                    progress_callback: (p) => {
                        fill.style.width = p.progress + '%';
                        engineInfo.innerText = `Syncing Brain: ${Math.round(p.progress)}%`;
                    }
                });

                // Jika Berhasil
                engineInfo.innerText = "Real Model Injected (Ready)";
                led.className = "w-2 h-2 bg-green-500 shadow-[0_0_5px_green] rounded-full";
                input.disabled = false;
                input.placeholder = "Tanya soal koding...";
                btn.classList.remove('opacity-20', 'pointer-events-none');
                document.getElementById('welcome-text').innerText = "Kite Engine & Brain siap digunakan. Mau koding apa hari ini?";

            } catch (err) {
                console.error(err);
                engineInfo.innerText = "Brain Sync Error - Check /brain folder";
                led.className = "w-2 h-2 bg-red-500 rounded-full";
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            if(role === 'user') {
                div.innerHTML = `<div class="user-bubble">${text}</div>`;
            } else {
                div.className = "ai-bubble flex gap-4";
                let formatted = text.replace(/```([\s\S]*?)```/g, '<pre class="code-block"><code>$1</code></pre>');
                div.innerHTML = `
                    <div class="w-8 h-8 rounded bg-black text-white flex items-center justify-center text-[10px] font-bold shrink-0">AI</div>
                    <div class="text-sm text-gray-800 pt-1 leading-relaxed flex-1">${formatted}</div>
                `;
            }
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        async function processAI() {
            const query = input.value.trim();
            if(!query) return;

            appendMessage('user', query);
            input.value = '';
            
            thinkArea.classList.remove('hidden');
            
            // Urutan status real-time sesuai perintah
            const sequence = [
                { s: "Membaca...", d: 700 },
                { s: "Menganalisa...", d: 1000 },
                { s: "Berpikir...", d: 1500 },
                { s: "Membalas...", d: 400 }
            ];

            for(let step of sequence) {
                statusLabel.innerText = step.s;
                await new Promise(r => setTimeout(r, step.d));
            }

            try {
                // INFERENSI NYATA: Model mengolah input menggunakan database brain
                const output = await generator(query, { 
                    max_new_tokens: 250, 
                    temperature: 0.7,
                    top_p: 0.9
                });
                
                thinkArea.classList.add('hidden');
                appendMessage('ai', output[0].generated_text);
            } catch (e) {
                thinkArea.classList.add('hidden');
                appendMessage('ai', "Error: Model gagal melakukan inferensi dari database brain.");
            }
        }

        btn.onclick = processAI;
        input.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btn.click(); } };

        initNeural();
    </script>
</body>
</html>
